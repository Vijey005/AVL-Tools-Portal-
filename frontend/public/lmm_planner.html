<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AVL LMM Planner v6</title>
<style>
/* ── THEME VARIABLES ── */
:root{
  --f:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono','Courier New',monospace;
  --rh:40px;--dw:28px;
  transition:background .2s,color .2s;
}
[data-theme="dark"]{
  --bg:transparent;--s0:transparent;--s1:rgba(255,255,255,0.02);--s2:rgba(255,255,255,0.04);--s3:rgba(255,255,255,0.08);
  --border:rgba(255, 255, 255, 0.08);--b1:rgba(255, 255, 255, 0.15);--text:#f0f4f8;--dim:#9ba3af;--faint:rgba(255,255,255,0.02);
  --teal:hsl(190, 80%, 45%);--teal-d:hsl(190, 80%, 55%);--green:hsl(145, 60%, 45%);--green-d:hsl(145, 60%, 35%);
  --red:hsl(355, 75%, 60%);--amber:hsl(40, 90%, 55%);--purple:#a78bfa;--blue:#60a5fa;
  --crit-bg:rgba(214,58,70,.06);--sel-bg:rgba(88,166,255,.1);
  --card:rgba(16, 21, 28, 0.65);--overlay:rgba(0,0,0,.78);
}
[data-theme="light"]{
  --bg:#f0f7f6;--s0:#e4efed;--s1:#d9eae8;--s2:#cce2df;--s3:#b8d6d3;
  --border:#a8cac7;--b1:#8ab8b4;--text:#1a2e2c;--dim:#4a7673;--faint:#b8d6d3;
  --teal:#059480;--teal-d:#047a69;--green:#1d9e63;--green-d:#168050;
  --red:#d63a46;--amber:#d97706;--purple:#7c3aed;--blue:#2563eb;
  --crit-bg:rgba(214,58,70,.06);--sel-bg:rgba(5,148,128,.1);
  --card:#d9eae8;--overlay:rgba(0,0,0,.55);
}

/* ── RESET ── */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;font-family:var(--f);font-size:14px;color:var(--text);background:transparent;}
input,select,textarea,button{font-family:inherit;font-size:inherit;color:inherit;}
input[type=date]{color-scheme:dark;}
[data-theme="light"] input[type=date]{color-scheme:light;}

/* ── SCROLLBARS ── */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--s0);}
::-webkit-scrollbar-thumb{background:var(--b1);border-radius:3px;}

/* ── LAYOUT ── */
#shell{display:flex;flex-direction:column;height:100%;}
#hbar{display:flex;align-items:center;gap:8px;padding:0 0 16px 0;height:auto;
  background:transparent;border-bottom:none;flex-shrink:0;z-index:100;}
#views{flex:1;min-height:0;position:relative;overflow:hidden;}
#views .view{display:none !important;position:absolute;inset:0;height:auto;}
#views .view.active{display:flex !important;flex-direction:column;}

/* ── HEADER ── */
.logo-wrap{display:flex;align-items:center;gap:8px;margin-right:4px;flex-shrink:0;}
.logo-wrap img{width:28px;height:28px;border-radius:6px;}
.logo-title{font-size:13px;font-weight:700;color:var(--teal);}
.logo-sub{font-size:9px;color:var(--dim);letter-spacing:.8px;}
.hbtn{background:transparent;border:1px solid rgba(255,255,255,0.08);color:var(--text);
  padding:8px 16px;border-radius:8px;cursor:pointer;font-size:0.9rem;font-weight:600;
  display:inline-flex;align-items:center;gap:6px;transition:all .2s cubic-bezier(0.4, 0, 0.2, 1);white-space:nowrap;flex-shrink:0;font-family:inherit;}
.hbtn:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.15);}
.hbtn:active{transform:scale(0.97);}
.hbtn.pri{background:var(--teal);border-color:var(--teal);color:#fff;box-shadow: 0 4px 12px hsla(180, 100%, 25%, 0.4);}
.hbtn.pri:hover{background:var(--teal-d);border-color:var(--teal-d);box-shadow: 0 6px 16px hsla(180, 100%, 25%, 0.4);transform:translateY(-1px);}
.hbtn.amb{background:transparent;border-color:rgba(255,255,255,0.08);color:var(--text);}
.hbtn.amb:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.15);}
.hbtn.danger{background:hsla(355, 75%, 60%, 0.15);color:var(--red);border-color:hsla(355, 75%, 60%, 0.3);}
.hbtn.danger:hover{background:var(--red);color:#fff;}
.hbtn:disabled{opacity:.4;cursor:not-allowed;}
.hsep{width:1px;height:20px;background:var(--border);margin:0 2px;flex-shrink:0;}
.hspace{flex:1;}
/* View tabs */
.vtab{background:none;border:none;color:var(--dim);padding:4px 10px;cursor:pointer;
  font-size:12px;font-weight:500;border-bottom:2px solid transparent;transition:all .12s;}
.vtab:hover{color:var(--text);}
.vtab.active{color:var(--teal);border-bottom-color:var(--teal);}
/* Mode badge */
.mbadge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;cursor:pointer;
  letter-spacing:.3px;flex-shrink:0;}
.mbadge.cfg{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3);}
.mbadge.prj{background:rgba(7,197,174,.15);color:var(--teal);border:1px solid rgba(7,197,174,.3);}

/* ── GANTT LAYOUT ── */
#gantt-view{flex:1;min-height:0;}
#zoom-bar{display:flex;align-items:center;gap:8px;padding:3px 10px;
  background:var(--s0);border-bottom:1px solid var(--border);font-size:11px;flex-shrink:0;}
#zoom-bar label{color:var(--dim);white-space:nowrap;}
#zoom-bar input[type=range]{width:80px;accent-color:var(--teal);}
#zoom-bar input[type=date]{background:var(--s2);border:1px solid var(--border);
  color:var(--text);padding:2px 6px;border-radius:4px;font-size:11px;outline:none;}
#gantt-split{flex:1;min-height:0;display:flex;overflow:hidden;}
#left-panel{flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border);}
#right-panel{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;}
#tl-wrap{background:var(--s0);border-bottom:1px solid var(--border);flex-shrink:0;overflow:hidden;scrollbar-gutter:stable;}
.tl-months{display:flex;background:var(--s1);}
.tl-month{font-size:11px;font-weight:600;color:var(--text);padding:0 6px;
  border-right:1px solid var(--border);white-space:nowrap;overflow:hidden;flex-shrink:0;
  display:flex;align-items:center;height:20px;}
.tl-weeks{display:flex;background:var(--s0);}
.tl-week{font-size:9px;font-weight:700;color:var(--purple);font-family:var(--mono);
  padding:0 3px;border-right:1px solid var(--border);flex-shrink:0;overflow:hidden;
  display:flex;align-items:center;height:16px;}
.tl-days{display:flex;}
.tld{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:9px;border-right:1px solid var(--border);height:22px;overflow:hidden;cursor:default;}
.tld .dn{font-weight:700;font-size:10px;}
.tld .dd{color:var(--dim);font-size:8px;}
.tld.we{background:rgba(0,0,0,.04);opacity:.5;}
.tld.tday{background:rgba(61,214,140,.12);border-color:var(--green)!important;}
.tld.tday .dn{color:var(--green);}
.tld.hol{background:rgba(244,97,110,.1);}
.tld.hol .dn{color:var(--red);}
/* Scrollable areas */
#task-body{flex:1;overflow-y:auto;overflow-x:hidden;}
#gantt-scroll{flex:1;overflow:auto;position:relative;scrollbar-gutter:stable;}
#gantt-inner{position:relative;}
/* Table rows */
.tr{display:flex;align-items:center;height:var(--rh);border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .08s;position:relative;flex-shrink:0;}
.tr:hover{background:var(--sel-bg);}
.tr.selected{background:var(--sel-bg);}
.tr.crit-row{border-left:3px solid var(--red);}
/* Column cells */
.td{flex-shrink:0;padding:0 6px;display:flex;align-items:center;overflow:hidden;
  border-right:1px solid var(--border);height:100%;font-size:12px;}
.td:last-child{border-right:none;}
/* Tree / indent */
.tree-tog{width:16px;height:16px;border-radius:3px;display:flex;align-items:center;
  justify-content:center;font-size:9px;flex-shrink:0;cursor:pointer;
  background:var(--s3);border:1px solid var(--b1);transition:background .1s;margin-right:3px;}
.tree-tog:hover{background:var(--b1);}
.tree-tog.leaf{background:transparent;border-color:transparent;pointer-events:none;}
.task-name-l0{font-weight:700;color:var(--teal);}
.task-name-mile{color:var(--amber);}
/* Gantt rows */
.grow{height:var(--rh);position:relative;border-bottom:1px solid var(--border);flex-shrink:0;}
.grow.crit-grow{background:var(--crit-bg);}
/* Bars */
.gbar{position:absolute;top:8px;height:24px;border-radius:4px;cursor:pointer;
  overflow:hidden;transition:filter .1s;}
.gbar:hover{filter:brightness(1.15);}
.gbar.summ{background:linear-gradient(90deg,var(--green-d),var(--green));height:16px;top:12px;border-radius:3px;}
.gbar.norm{background:linear-gradient(90deg,var(--teal-d),var(--teal));}
.gbar.crit{background:linear-gradient(90deg,#b91c1c,var(--red));}
.gbar.sel{outline:2px solid #fff;outline-offset:1px;}
/* Progress fill overlay */
.gbar-done{position:absolute;top:0;left:0;height:100%;background:rgba(0,0,0,.22);pointer-events:none;}
/* Bar label */
.gbar-lbl{position:absolute;top:0;left:0;height:100%;display:flex;align-items:center;
  padding:0 5px;font-size:10px;font-weight:600;color:rgba(255,255,255,.9);
  white-space:nowrap;overflow:hidden;pointer-events:none;}
/* Milestone */
.gbar.mile{width:16px!important;height:16px!important;top:12px;transform:rotate(45deg);
  border-radius:2px;background:var(--amber);}
/* Today line */
.today-l{position:absolute;top:0;bottom:0;width:2px;background:var(--green);opacity:.6;z-index:4;pointer-events:none;}
/* Holiday line */
.hol-l{position:absolute;top:0;bottom:0;width:1px;background:rgba(244,97,110,.35);z-index:3;pointer-events:none;}
/* Dependency arrows SVG */
#dep-svg{position:absolute;top:0;left:0;pointer-events:none;z-index:5;overflow:visible;}
/* Header row */
#hdr-row{display:flex;background:var(--s1);border-bottom:2px solid var(--border);flex-shrink:0;}
.thd{flex-shrink:0;font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;
  letter-spacing:.5px;padding:0 6px;display:flex;align-items:center;
  border-right:1px solid var(--border);height:28px;white-space:nowrap;overflow:hidden;
  position:relative;user-select:none;}
.col-rh{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;
  background:transparent;z-index:10;}
.col-rh:hover,.col-rh.dragging{background:var(--teal);opacity:.6;}
/* Prevent scrollbar from misaligning header vs rows */
#task-body{scrollbar-gutter:stable;}
/* Resource chips */
.rchip{font-size:10px;font-weight:600;padding:1px 5px;border-radius:8px;margin:1px;
  display:inline-flex;align-items:center;max-width:70px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;}
/* Progress bar in cell */
.pbar-w{flex:1;min-width:40px;display:flex;align-items:center;gap:4px;}
.pbar{flex:1;height:5px;background:var(--s3);border-radius:3px;overflow:hidden;}
.pbar-f{height:100%;background:var(--teal);border-radius:3px;transition:width .3s;}
.pbar-f.crit{background:var(--red);}
.pct-lbl{font-size:10px;color:var(--dim);min-width:26px;text-align:right;font-family:var(--mono);}
/* Critical dot */
.crit-dot{width:5px;height:5px;border-radius:50%;background:var(--red);flex-shrink:0;margin-left:2px;}
/* Pred lag badge */
.lag-badge{font-size:9px;font-family:var(--mono);color:var(--purple);background:rgba(167,139,250,.12);
  border:1px solid rgba(167,139,250,.2);border-radius:3px;padding:0 3px;position:absolute;top:-8px;}

/* ── STATS VIEW ── */
#stats-view{flex:1;min-height:0;padding:20px;overflow-y:auto;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:20px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center;}
.kpi-val{font-size:28px;font-weight:800;color:var(--teal);}
.kpi-val.red{color:var(--red);}
.kpi-val.green{color:var(--green);}
.kpi-lbl{font-size:11px;color:var(--dim);margin-top:2px;}
.section-title{font-size:13px;font-weight:700;color:var(--text);margin:16px 0 8px;
  display:flex;align-items:center;gap:6px;}
/* Progress bars */
.stat-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;font-size:12px;}
.stat-name{width:160px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.stat-bar{flex:1;height:8px;background:var(--s3);border-radius:4px;overflow:hidden;}
.stat-fill{height:100%;border-radius:4px;background:var(--teal);}
.stat-fill.crit{background:var(--red);}
.stat-fill.warn{background:var(--amber);}
.stat-pct{width:36px;text-align:right;font-family:var(--mono);font-size:11px;color:var(--dim);}
/* Tab pills in stats */
.tab-pills{display:flex;gap:4px;margin-bottom:14px;}
.tab-pill{background:var(--s2);border:1px solid var(--border);color:var(--dim);
  padding:4px 12px;border-radius:20px;cursor:pointer;font-size:12px;transition:all .12s;}
.tab-pill.active{background:var(--teal);border-color:var(--teal);color:#fff;}

/* ── SUMMARY VIEW ── */
#summary-view{flex:1;min-height:0;overflow:auto;}
#sum-table{width:100%;border-collapse:collapse;table-layout:fixed;}
#sum-table thead{position:sticky;top:0;z-index:10;background:var(--s1);}
#sum-table th{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;
  letter-spacing:.5px;padding:6px 8px;border-bottom:2px solid var(--border);
  border-right:1px solid var(--border);white-space:nowrap;overflow:hidden;}
#sum-table td{padding:5px 8px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);
  font-size:12px;overflow:hidden;vertical-align:middle;}
#sum-table tr.sum-l0{background:rgba(7,197,174,.05);border-left:3px solid var(--teal);}
.sum-bar.s-summ{background:linear-gradient(90deg,var(--green-d),var(--green));}
.sum-tl-cell{position:relative;height:28px;}
.sum-bar-wrap{position:absolute;inset:3px 0;background:var(--s3);border-radius:3px;overflow:hidden;}
.sum-bar{position:absolute;top:0;height:100%;border-radius:3px;}
.sum-bar.s-norm{background:linear-gradient(90deg,var(--teal-d),var(--teal));}
.sum-bar.s-crit{background:linear-gradient(90deg,#b91c1c,var(--red));}
.sum-bar.s-mile{width:14px!important;height:14px;top:50%;transform:translateY(-50%) rotate(45deg);border-radius:2px;background:var(--amber);}
.sum-today{position:absolute;top:0;bottom:0;width:2px;background:var(--green);opacity:.6;z-index:2;}
/* Summary ruler */
.sum-ruler{position:relative;height:16px;overflow:hidden;}
.sum-ruler-mark{position:absolute;top:0;font-size:9px;color:var(--dim);font-family:var(--mono);
  transform:translateX(-50%);white-space:nowrap;}
.sum-ruler-tick{position:absolute;top:8px;bottom:0;width:1px;background:var(--border);}

/* ── ANALYSIS VIEW ── */
#analysis-view{flex:1;min-height:0;overflow-y:auto;padding:16px;}
.cg-row{display:flex;align-items:center;height:52px;border-bottom:1px solid var(--border);position:relative;}
.cg-row.cg-hidden{display:none;}
.cg-label{width:220px;flex-shrink:0;padding:0 8px;display:flex;flex-direction:column;gap:2px;border-right:1px solid var(--border);}
.cg-label-name{font-size:12px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:4px;}
.cg-label-name.l0{color:var(--teal);font-weight:700;}
.cg-label-delta{font-size:10px;font-family:var(--mono);}
.cg-toggle{width:14px;height:14px;border-radius:2px;background:var(--s3);border:1px solid var(--b1);
  cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0;}
.cg-bars{flex:1;position:relative;height:52px;overflow:hidden;}
.cg-bar-base{position:absolute;height:8px;top:8px;border-radius:2px;background:rgba(90,148,144,.35);border:1px solid rgba(90,148,144,.5);}
.cg-bar-cur{position:absolute;height:18px;top:20px;border-radius:3px;}
.cg-bar-cur.on-time{background:linear-gradient(90deg,var(--teal-d),var(--teal));}
.cg-bar-cur.delayed{background:linear-gradient(90deg,#b91c1c,var(--red));}
.cg-bar-cur.ahead{background:linear-gradient(90deg,var(--green-d),var(--green));}
.cg-bar-cur.casc-delay{background:repeating-linear-gradient(135deg,rgba(244,97,110,.45) 0,rgba(244,97,110,.45) 5px,rgba(244,97,110,.2) 5px,rgba(244,97,110,.2) 10px);border:1px solid rgba(244,97,110,.4);}
.cg-bar-cur.casc-ahead{background:repeating-linear-gradient(135deg,rgba(61,214,140,.4) 0,rgba(61,214,140,.4) 5px,rgba(61,214,140,.15) 5px,rgba(61,214,140,.15) 10px);border:1px solid rgba(61,214,140,.35);}
.cg-bar-cur.no-base{background:rgba(7,197,174,.4);}
.cg-reason-badge{position:absolute;width:16px;height:16px;border-radius:50%;font-size:8px;font-weight:800;
  display:flex;align-items:center;justify-content:center;color:#fff;background:var(--amber);top:20px;z-index:3;}

/* ── SETTINGS VIEW ── */
#settings-view{flex:1;min-height:0;overflow-y:auto;padding:20px;}
.settings-section{background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:16px;margin-bottom:14px;}
.settings-section h3{font-size:13px;font-weight:700;color:var(--teal);margin-bottom:10px;
  display:flex;align-items:center;gap:6px;}
.mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;}
.mode-card{border:2px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;
  transition:all .15s;text-align:center;}
.mode-card:hover{border-color:var(--b1);}
.mode-card.active-cfg{border-color:var(--amber);background:rgba(245,158,11,.06);}
.mode-card.active-prj{border-color:var(--teal);background:rgba(7,197,174,.06);}
.mode-card-icon{font-size:24px;margin-bottom:6px;}
.mode-card-title{font-size:12px;font-weight:700;margin-bottom:4px;}
.mode-card-desc{font-size:11px;color:var(--dim);line-height:1.4;}
/* Reason list */
.reason-item{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.ri-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;background:var(--s3);color:var(--dim);flex-shrink:0;}
.ri-inp{flex:1;background:var(--s2);border:1px solid var(--border);color:var(--text);
  padding:4px 8px;border-radius:4px;font-size:12px;outline:none;}
.ri-inp:focus{border-color:var(--teal);}
/* Holiday list */
.hol-item{display:flex;align-items:center;gap:6px;margin-bottom:5px;}

/* ── MODAL ── */
#overlay{display:none;position:fixed;inset:0;background:var(--overlay);
  z-index:200;align-items:center;justify-content:center;}
#overlay.show{display:flex;}
#modal{background:var(--s0);border:1px solid var(--border);border-radius:10px;
  padding:20px;width:540px;max-width:96vw;max-height:92vh;overflow-y:auto;
  box-shadow:0 8px 40px rgba(0,0,0,.5);}
.mtit{font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px;}
.mrow{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.mfg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px;}
.mfg.wide{flex:2;}
.mfg label{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.4px;}
.minp{background:var(--s2);border:1px solid var(--border);color:var(--text);
  padding:6px 8px;border-radius:5px;font-size:13px;outline:none;width:100%;}
.minp:focus{border-color:var(--teal);}
.mbtns{display:flex;align-items:center;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid var(--border);}
.mbtns .spacer{flex:1;}
/* Pred rows */
.pred-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
/* Combobox */
.combo{position:relative;flex:1;}
.combo-inp{width:100%;background:var(--s2);border:1px solid var(--border);color:var(--text);
  padding:5px 8px;border-radius:5px;font-size:12px;outline:none;}
.combo-inp:focus{border-color:var(--teal);}
.combo-drop{position:absolute;top:calc(100%+2px);left:0;right:0;background:var(--s1);
  border:1px solid var(--teal);border-radius:5px;max-height:160px;overflow-y:auto;
  z-index:300;display:none;box-shadow:0 4px 20px rgba(0,0,0,.5);}
.combo-drop.open{display:block;}
.combo-opt{display:flex;align-items:center;gap:6px;padding:5px 8px;cursor:pointer;font-size:12px;
  border-bottom:1px solid var(--border);}
.combo-opt:last-child{border:none;}
.combo-opt:hover,.combo-opt.cur{background:rgba(7,197,174,.1);color:var(--teal);}
.combo-opt .oid{font-family:var(--mono);font-size:10px;color:var(--dim);
  background:var(--s3);padding:1px 4px;border-radius:2px;flex-shrink:0;}
.combo-empty{padding:8px;color:var(--dim);font-size:11px;text-align:center;}

/* ── MULTI-ADD ── */
#madd-box{width:800px;max-width:98vw;}
.madd-table{width:100%;border-collapse:collapse;font-size:12px;}
.madd-table th{background:var(--s2);padding:4px 6px;font-size:10px;font-weight:700;
  color:var(--dim);text-transform:uppercase;letter-spacing:.4px;border:1px solid var(--border);}
.madd-table td{padding:2px 3px;border:1px solid var(--border);}
.madd-inp{background:var(--s2);border:none;color:var(--text);padding:4px 5px;
  font-size:12px;outline:none;width:100%;}
.madd-inp:focus{background:var(--s1);outline:1px solid var(--teal);}
.madd-sel{background:var(--s2);border:none;color:var(--text);padding:3px;font-size:11px;width:100%;}

/* ── REASON MODAL ── */
#reason-box{width:480px;max-width:96vw;}
.reason-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.rchip-btn{background:var(--s2);border:1px solid var(--border);color:var(--text);
  padding:5px 10px;border-radius:5px;cursor:pointer;font-size:12px;transition:all .12s;}
.rchip-btn:hover{border-color:var(--b1);}
.rchip-btn.sel{background:rgba(7,197,174,.12);border-color:var(--teal);color:var(--teal);}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;right:20px;background:var(--s1);border:1px solid var(--border);
  color:var(--text);padding:8px 16px;border-radius:6px;font-size:12px;
  box-shadow:0 4px 16px rgba(0,0,0,.4);z-index:500;transform:translateY(60px);
  transition:transform .25s;pointer-events:none;}
#toast.show{transform:translateY(0);}

/* ── DIRTY INDICATOR ── */
.dirty-dot{width:6px;height:6px;border-radius:50%;background:var(--amber);
  flex-shrink:0;display:none;}
.dirty-dot.show{display:block;}

/* ── THEME TOGGLE ── */
.theme-btn{background:none;border:1px solid var(--border);color:var(--dim);
  padding:3px 8px;border-radius:20px;cursor:pointer;font-size:11px;
  display:flex;align-items:center;gap:4px;}
.theme-btn:hover{border-color:var(--b1);color:var(--text);}

/* Quick-edit popover on gantt bar */
#qedit{position:fixed;background:var(--s1);border:1px solid var(--teal);border-radius:7px;
  padding:10px 12px;z-index:300;min-width:220px;box-shadow:0 6px 24px rgba(0,0,0,.5);
  display:none;}
#qedit.show{display:block;}
#qedit .qe-title{font-size:11px;font-weight:700;color:var(--teal);margin-bottom:7px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
#qedit .qe-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
#qedit label{font-size:10px;color:var(--dim);white-space:nowrap;}
#qedit input[type=number]{width:55px;background:var(--s2);border:1px solid var(--border);
  color:var(--text);padding:3px 5px;border-radius:4px;font-size:12px;}
#qedit textarea{width:100%;background:var(--s2);border:1px solid var(--border);color:var(--text);
  padding:4px 6px;border-radius:4px;font-size:12px;resize:vertical;min-height:44px;}
#qedit .qe-btns{display:flex;gap:5px;margin-top:5px;}

/* Row action buttons — absolute overlay anchored just right of the # column */
.row-acts{position:absolute;right:6px;top:50%;transform:translateY(-50%);
  display:none;gap:2px;z-index:30;background:var(--s1);border:1px solid var(--teal);
  border-radius:5px;padding:2px;box-shadow:-2px 2px 12px rgba(0,0,0,.55);}
.tr:hover .row-acts{display:flex;}
.row-act{background:var(--s2);border:1px solid var(--border);color:var(--text);
  width:22px;height:20px;font-size:11px;border-radius:3px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;padding:0;line-height:1;}
.row-act:hover{background:var(--teal);color:#fff;border-color:var(--teal);}

/* ════ PLANNING COMPARATOR ════ */
.cmp-drop{border:2px dashed var(--b1);border-radius:10px;padding:20px;text-align:center;
  background:var(--s0);margin-bottom:14px;transition:all .15s;}
.cmp-drop.drag{border-color:var(--teal);background:rgba(7,197,174,.06);}
.cmp-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.cmp-chip{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);
  border-left:4px solid var(--teal);border-radius:7px;padding:8px 12px;font-size:12px;min-width:180px;}
.cmp-chip .cc-idx{width:22px;height:22px;border-radius:50%;background:var(--teal);color:#fff;
  font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cmp-chip .cc-meta{flex:1;overflow:hidden;}
.cmp-chip .cc-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cmp-chip .cc-date{font-size:10px;color:var(--dim);}
.cmp-chip .cc-x{cursor:pointer;color:var(--red);font-weight:700;}
.cmp-err{background:rgba(244,97,110,.1);border:1px solid var(--red);color:var(--red);
  border-radius:8px;padding:12px 16px;margin-bottom:14px;font-size:13px;font-weight:600;}
.cmp-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px;}
.cmp-section{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:14px;}
.cmp-section h3{font-size:13px;font-weight:700;color:var(--teal);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.cmp-trans-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;}
.cmp-trans-tab{background:var(--s2);border:1px solid var(--border);color:var(--dim);
  padding:5px 12px;border-radius:20px;cursor:pointer;font-size:11px;white-space:nowrap;}
.cmp-trans-tab.active{background:var(--teal);border-color:var(--teal);color:#fff;}
.cmp-change-row{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px;}
.cmp-change-row:last-child{border:none;}
.cmp-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;flex-shrink:0;text-transform:uppercase;letter-spacing:.3px;}
.cmp-badge.add{background:rgba(61,214,140,.15);color:var(--green);}
.cmp-badge.rem{background:rgba(244,97,110,.15);color:var(--red);}
.cmp-badge.mod{background:rgba(96,165,250,.15);color:var(--blue);}
.cmp-impact{font-family:var(--mono);font-size:11px;font-weight:700;margin-left:auto;flex-shrink:0;}
.cmp-task-evo{position:relative;height:24px;background:var(--s3);border-radius:3px;margin:3px 0;}
.cmp-evo-bar{position:absolute;height:16px;top:4px;border-radius:3px;}
.cmp-filter-pills{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;}
.cmp-fp{background:var(--s2);border:1px solid var(--border);color:var(--dim);padding:3px 10px;border-radius:14px;cursor:pointer;font-size:11px;}
.cmp-fp.active{background:var(--teal);border-color:var(--teal);color:#fff;}

/* Lessons-learnt report cards */
.ll-report{display:flex;flex-direction:column;gap:12px;}
.ll-card{background:var(--s0);border:1px solid var(--border);border-radius:8px;padding:14px;}
.ll-title{font-size:13px;font-weight:700;color:var(--teal);margin-bottom:10px;}
.ll-row{display:flex;gap:10px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border);}
.ll-row:last-child{border:none;}
.ll-imp{font-family:var(--mono);font-weight:700;font-size:12px;flex-shrink:0;}
</style>
</head>
<body>

<div id="shell">
  <!-- HEADER -->
  <div id="hbar">
    <button class="hbtn" onclick="window.parent.postMessage({action:'goBack'},'*')" style="background:transparent;color:var(--teal);border:none;margin-right:6px;font-weight:700;font-size:14px;padding:2px">← Hub</button>
    <div class="hsep" style="margin-right:10px"></div>

    <div class="hsep"></div>
    <input id="proj-inp" class="minp" style="width:160px;padding:3px 8px;font-size:12px" placeholder="Project name" value="New Project" oninput="markDirty()">
    <div class="dirty-dot" id="dirty-dot"></div>
    <div class="hsep"></div>
    <span id="cloud-sync" style="font-size:11px;color:var(--dim);display:flex;align-items:center;gap:4px"><span style="color:var(--green)">✓</span> Saved to Cloud</span>
    <div class="hsep"></div>
    <button class="hbtn amb" onclick="openMultiAdd()">⚡ Multi-Add</button>
    <button class="hbtn pri" onclick="openTaskModal(null)">＋ Task</button>
    <button class="hbtn" onclick="openResModal()">👥 Resources</button>
    <button class="hbtn" onclick="linkMode()" id="link-btn">🔗 Link</button>
    <button class="hbtn" onclick="expandAll()" title="Expand all">⊞ Expand</button>
    <button class="hbtn" onclick="collapseAll()" title="Collapse all to top level">⊟ Collapse</button>
    <div class="hsep"></div>
    <button class="hbtn" onclick="exportExcel()">📊 Excel</button>
    <button class="hbtn" onclick="importClick()">📥 Import</button>
    <button class="hbtn" onclick="dlTemplate()">📋 Tmpl</button>
    <input type="file" id="xl-input" accept=".xlsx,.xls" style="display:none" onchange="importXL(this)">
    <input type="file" id="json-input" accept=".json" style="display:none" onchange="loadJSON(this)">
    <input type="file" id="cmp-input" accept=".json" multiple style="display:none" onchange="loadCmpFiles(this)">
    <div class="hsep"></div>
    <span class="mbadge cfg" id="mode-badge" onclick="toggleMode()">CONFIG MODE</span>
    <div class="hspace"></div>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">🌙 Dark</button>
    <div class="hsep"></div>
    <button class="vtab active" id="tab-gantt" onclick="switchView('gantt')">📊 Gantt</button>
    <button class="vtab" id="tab-stats" onclick="switchView('stats')">📈 Statistics</button>
    <button class="vtab" id="tab-summary" onclick="switchView('summary')">🗺 Summary</button>
    <button class="vtab" id="tab-settings" onclick="switchView('settings')">⚙ Settings</button>
    <button class="vtab" id="tab-analysis" onclick="switchView('analysis')">🔎 Analysis</button>
    <button class="vtab" id="tab-comparator" onclick="switchView('comparator')">⚖ Compare</button>
  </div>

  <!-- VIEWS -->
  <div id="views">

    <!-- GANTT VIEW -->
    <div id="gantt-view" class="view active">
      <div id="zoom-bar">
        <label>📅 Range:</label>
        <input type="date" id="zt-s" oninput="renderGantt()" title="Start">
        <span style="color:var(--dim)">→</span>
        <input type="date" id="zt-e" oninput="renderGantt()" title="End">
        <button class="hbtn" onclick="resetZoom()" style="padding:2px 8px;font-size:10px">Reset</button>
        <div style="width:1px;height:18px;background:var(--border);margin:0 4px"></div>
        <label>Scale:</label>
        <input type="range" id="zt-dw" min="4" max="64" value="28" oninput="setDW(this.value)">
        <span id="zt-dw-lbl" style="font-family:var(--mono);font-size:10px;color:var(--teal);min-width:32px">28px</span>
      </div>
      <div id="gantt-split">
        <div id="left-panel">
          <div id="hdr-row"></div>
          <div id="task-body"></div>
        </div>
        <div id="right-panel">
          <div id="tl-wrap">
            <div class="tl-months" id="tl-months"></div>
            <div class="tl-weeks" id="tl-weeks" style="display:none"></div>
            <div class="tl-days" id="tl-days"></div>
          </div>
          <div id="gantt-scroll">
            <div id="gantt-inner">
              <svg id="dep-svg"></svg>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- STATS VIEW -->
    <div id="stats-view" class="view">
      <div style="display:flex;gap:6px;padding:12px 20px 0;flex-shrink:0;">
        <button class="tab-pill active" id="sp-ov" onclick="statTab('ov')">Overview</button>
        <button class="tab-pill" id="sp-rs" onclick="statTab('rs')">Resources</button>
        <button class="tab-pill" id="sp-cp" onclick="statTab('cp')">Critical Path</button>
      </div>
      <div id="stats-content" style="flex:1;padding:16px 20px;overflow-y:auto;"></div>
    </div>

    <!-- SUMMARY VIEW -->
    <div id="summary-view" class="view">
      <div style="padding:8px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);background:var(--s0);flex-shrink:0;">
        <span style="font-size:11px;color:var(--dim)">Project structure &amp; timeline</span>
        <button class="hbtn" onclick="expandAllSum()" style="font-size:11px">⊞ Expand all</button>
        <button class="hbtn" onclick="collapseAllSum()" style="font-size:11px">⊟ Collapse all</button>
        <div style="flex:1"></div>
        <button class="hbtn" onclick="captureSummary()">📷 Screenshot</button>
      </div>
      <div style="overflow:auto;flex:1;" id="sum-wrap">
        <table id="sum-table"><thead><tr id="sum-thead"></tr></thead><tbody id="sum-tbody"></tbody></table>
      </div>
    </div>

    <!-- SETTINGS VIEW -->
    <div id="settings-view" class="view">
      <div id="settings-content" style="flex:1;overflow-y:auto;padding:20px;max-width:800px;"></div>
    </div>

    <!-- ANALYSIS VIEW -->
    <!-- COMPARATOR VIEW -->
    <div id="comparator-view" class="view">
      <div id="comparator-content" style="flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;"></div>
    </div>

    <div id="analysis-view" class="view">
      <div id="analysis-content" style="flex:1;overflow-y:auto;padding:16px;"></div>
    </div>

  </div>
</div>

<script>

// ═══ CONSTANTS ═══

// ═══ STATE ═══
let tasks=[],resources=[],collapsed=new Set();
let selId=null,lm=false,lsrc=null;

let workMode='full',holidays=[];
let pendingChange=null,changeIdSeq=1,reasonSeq=13;

// ═══ DATE UTILS (UTC — immune to DST) ═══
const fmt=d=>`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
const parse=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(Date.UTC(y,m-1,d));};
const diff=(a,b)=>Math.round((parse(b)-parse(a))/864e5);
const addD=(s,n)=>{const d=parse(s);d.setUTCDate(d.getUTCDate()+n);return fmt(d);};
const td0=()=>fmt(new Date());
const fedit=s=>{const[y,m,d]=s.split('-');return`${d}/${m}/${y}`;};
const parseUD=s=>{if(!s)return'';s=String(s).trim();if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;const p=s.split(/[\/\-\.]/);if(p.length===3){if(p[0].length===4)return`${p[0]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`;return`${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;}return'';};
function isoWeek(s){const d=parse(s),day=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-day);const y0=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil((((d-y0)/864e5)+1)/7);}
function isHol(s){return holidays.some(h=>h.date===s);}
function isWE(s){const d=parse(s).getUTCDay();return d===0||d===6;}
function isNWD(s){return(workMode==='work'&&isWE(s))||isHol(s);}
function addWorkD(s,n){if(!n)return s;let d=parse(s),rem=Math.abs(n),sg=n>0?1:-1;while(rem>0){d.setUTCDate(d.getUTCDate()+sg);if(!isNWD(fmt(d)))rem--;}return fmt(d);}
function schedAddD(s,n){return workMode==='work'?addWorkD(s,n):addD(s,n);}
function workDiff(a,b){if(a===b)return 0;let d=parse(a),cnt=0,sg=b>a?1:-1;while(fmt(d)!==b){d.setUTCDate(d.getUTCDate()+sg);if(!isNWD(fmt(d)))cnt+=sg;}return cnt;}
function calendarToWork(s,e){return workMode==='work'?Math.max(1,workDiff(s,e)+1):Math.max(1,diff(s,e)+1);}

// ═══ TREE UTILS ═══
const GT=id=>tasks.find(t=>t.id===id);
const GR=id=>resources.find(r=>r.id===id);
const tIdx=id=>tasks.findIndex(t=>t.id===id);
function getDesc(id){const i=tIdx(id);if(i<0)return[];const lv=tasks[i].level,r=[];for(let j=i+1;j<tasks.length;j++){if(tasks[j].level<=lv)break;r.push(tasks[j].id);}return r;}
function hasKids(id){return getDesc(id).length>0;}
function isHidden(id){const i=tIdx(id);if(i<0||tasks[i].level===0)return false;for(let j=i-1;j>=0;j--){if(tasks[j].level<tasks[i].level)return collapsed.has(tasks[j].id)||isHidden(tasks[j].id);}return false;}
function isAnc(ancId,id){const i=tIdx(id);if(i<0)return false;let lv=tasks[i].level;if(lv===0)return false;for(let j=i-1;j>=0;j--){if(tasks[j].level<lv){if(tasks[j].id===ancId)return true;if(tasks[j].level===0)return false;lv=tasks[j].level;}}return false;}
function getVis(){return tasks.filter(t=>!isHidden(t.id));}
const PS=()=>tasks.reduce((m,t)=>t.start<m?t.start:m,tasks[0]?.start||td0());
const PE=()=>tasks.reduce((m,t)=>t.end>m?t.end:m,tasks[0]?.end||td0());
const predsDisp=ps=>(ps||[]).map(p=>p.lag?`${p.id}${p.lag>0?'+':''}${p.lag}d`:String(p.id)).join(',');
const normPreds=arr=>(arr||[]).map(p=>typeof p==='number'?{id:p,lag:0}:({id:p.id,lag:p.lag||0})).filter(p=>GT(p.id));
function parsePredStr(s){const r=[];String(s||'').split(',').forEach(t=>{t=t.trim();if(!t)return;const m=t.match(/^(\d+)([+-]\d+)d?$/);if(m)r.push({id:parseInt(m[1]),lag:parseInt(m[2])});else{const n=parseInt(t);if(!isNaN(n))r.push({id:n,lag:0});}});return r;}

// ═══ SCHEDULING ENGINE ═══
function requiredStart(t){
  const descs=new Set(getDesc(t.id));
  let latest='0000-00-00';
  (t.preds||[]).forEach(p=>{
    const x=GT(p.id);if(!x)return;
    if(isAnc(p.id,t.id)||descs.has(p.id))return;
    const c=schedAddD(x.end,p.lag||0);
    if(c>latest)latest=c;
  });
  return latest>'0000-00-00'?schedAddD(latest,1):null;
}
function recalcParentSpans(){
  // Process STRICTLY bottom-up: tasks with highest index first.
  // This ensures deeply nested parents (L3 container of L4/L5) are
  // resolved before their L1/L2 ancestors read their dates.
  for(let i=tasks.length-1;i>=0;i--){
    const t=tasks[i];
    if(t.milestone)continue; // milestones are never containers
    const ds=getDesc(t.id);if(!ds.length)continue;
    const dt=ds.map(id=>GT(id)).filter(Boolean);
    if(!dt.length)continue;
    let ms=dt[0].start,me=dt[0].end;
    for(let j=1;j<dt.length;j++){
      if(dt[j].start<ms)ms=dt[j].start;
      if(dt[j].end>me)me=dt[j].end;
    }
    // Only update if something actually changed (avoid infinite loops)
    if(t.start!==ms||t.end!==me){
      t.start=ms;t.end=me;t.duration=Math.max(1,calendarToWork(ms,me));
    }
  }
}
function recalc(){
  if(!tasks.length)return;
  const vis=new Set(),ord=[];
  function vi(t){if(vis.has(t.id))return;vis.add(t.id);(t.preds||[]).forEach(p=>{const x=GT(p.id);if(x)vi(x);});ord.push(t);}
  tasks.forEach(t=>vi(t));
  // Pass 1: schedule leaves
  ord.forEach(t=>{
    if(hasKids(t.id))return;
    const rs=requiredStart(t);
    if(rs&&rs>t.start)t.start=rs;
    t.end=schedAddD(t.start,t.duration-1);
  });
  // Pass 2: iterative parent + leaf stabilisation
  for(let it=0;it<6;it++){
    let ch=false;
    recalcParentSpans();
    // Enforce parent preds
    tasks.forEach(t=>{
      if(!hasKids(t.id))return;
      const rs=requiredStart(t);if(!rs||rs<=t.start)return;
      const pd=diff(t.start,rs);
      getDesc(t.id).forEach(did=>{const dt=GT(did);if(!dt)return;dt.start=addD(dt.start,pd);dt.end=addD(dt.end,pd);});
      ch=true;
    });
    // Re-schedule leaves
    ord.forEach(t=>{
      if(hasKids(t.id))return;
      const rs=requiredStart(t);if(!rs||rs<=t.start)return;
      t.start=rs;t.end=schedAddD(t.start,t.duration-1);ch=true;
    });
    if(!ch)break;
  }
  recalcParentSpans();
  cpm(ord);
}
function cpm(ord){
  const est={},eft={},lft={},lst={},succ={};
  tasks.forEach(t=>succ[t.id]=[]);
  tasks.forEach(t=>(t.preds||[]).forEach(p=>{if(succ[p.id])succ[p.id].push(t.id);}));
  ord.forEach(t=>{
    const ps=t.preds||[];
    est[t.id]=ps.length?Math.max(...ps.map(p=>eft[p.id]!==undefined?eft[p.id]+(p.lag||0)+1:0)):0;
    eft[t.id]=est[t.id]+t.duration-1;
  });
  const pd=Math.max(...tasks.map(t=>eft[t.id]||0));
  [...ord].reverse().forEach(t=>{
    const sc=succ[t.id];
    lft[t.id]=sc.length?Math.min(...sc.map(sid=>lst[sid]!==undefined?lst[sid]-1:pd)):pd;
    lst[t.id]=lft[t.id]-t.duration+1;
    t.slack=lst[t.id]-est[t.id];
    t.isCrit=t.slack===0;
  });
}

// ═══ RENDERING: HEADER ═══
function renderHdr(){

// ═══ RENDERING: TASK TABLE ═══
function renderTable(){
  const body=document.getElementById('task-body');if(!body)return;
  body.innerHTML='';
  const vis=getVis();
  vis.forEach((t,vi)=>{
    const row=document.createElement('div');
    row.className='tr'+(t.id===selId?' selected':'')+(t.isCrit?' crit-row':'');
    row.dataset.id=t.id;
    row.onclick=e=>{if(e.target.tagName==='INPUT'||e.target.tagName==='BUTTON'||e.target.classList.contains('tree-tog'))return;sel(t.id);};
    row.ondblclick=e=>{if(e.target.classList.contains('tree-tog'))return;if(e.target.dataset.col==='name'){startInlineEdit(t.id,row);}else openTaskModal(t.id);};
    COLS.forEach(c=>{
      const td=document.createElement('div');
      td.className='td';td.style.width=c.w+'px';td.style.minWidth=c.w+'px';

      td.dataset.col=c.k;
      fillCell(td,t,c.k,vi,row);
      row.appendChild(td);
    });
    body.appendChild(row);
  });
}
function fillCell(td,t,k,vi,row){
  switch(k){
    case 'num':{
      const num=document.createElement('span');num.style.cssText='font-size:10px;color:var(--dim);';num.textContent=vi+1;
      td.appendChild(num);
      // Action overlay (visible on row hover via CSS, positioned absolutely on the ROW not TD)
      const acts=document.createElement('div');acts.className='row-acts';
      [['↑',`moveTask(${t.id},-1)`,'Move up'],
       ['↓',`moveTask(${t.id},1)`,'Move down'],
       ['⊕',`insertAbove(${t.id})`,'Insert task above'],
       ['⊕↓',`insertBelow(${t.id})`,'Insert task below/child']
      ].forEach(([ico,fn,tip])=>{
        const b=document.createElement('button');b.className='row-act';b.textContent=ico;b.title=tip;
        b.onclick=e=>{e.stopPropagation();eval(fn);};acts.appendChild(b);
      });
      row.appendChild(acts); // attach to row, not td
      break;}
    case 'name':{
      // Indent based on level
      td.style.paddingLeft=(6+t.level*14)+'px';
      const tog=document.createElement('div');
      const hc=hasKids(t.id);
      tog.className='tree-tog'+(hc?'':' leaf');
      tog.textContent=hc?(collapsed.has(t.id)?'▶':'▼'):'';
      tog.onclick=e=>{e.stopPropagation();if(!hc)return;if(collapsed.has(t.id))collapsed.delete(t.id);else collapsed.add(t.id);renderTable();renderGantt();};
      td.appendChild(tog);
      if(t.milestone){const mi=document.createElement('span');mi.textContent='◆ ';mi.style.color='var(--amber)';td.appendChild(mi);}
      const nm=document.createElement('span');
      nm.style.overflow='hidden';nm.style.textOverflow='ellipsis';nm.style.whiteSpace='nowrap';
      nm.className=t.level===0?'task-name-l0':(t.milestone?'task-name-mile':'');
      nm.textContent=t.name;nm.title=t.name;
      td.appendChild(nm);
      if(t.isCrit&&!t.milestone){const dot=document.createElement('div');dot.className='crit-dot';td.appendChild(dot);}
      break;}
    case 'dur':
      td.textContent=t.duration+'d';
      if(hasKids(t.id)){td.style.color='var(--dim)';td.title='Auto-calculated from children';}
      break;
    case 'start':td.textContent=fedit(t.start);break;
    case 'end':td.textContent=fedit(t.end);break;
    case 'pred':{
      const ps=(t.preds||[]).filter(p=>GT(p.id));
      if(!ps.length){td.innerHTML='<span style="color:var(--dim)">—</span>';break;}
      td.textContent=predsDisp(ps);break;}
    case 'res':{
      (t.resources||[]).forEach(ra=>{
        const r=GR(ra.id);if(!r)return;
        const chip=document.createElement('span');
        chip.className='rchip';chip.textContent=r.name.split(' ')[0];
        chip.style.cssText=`background:${r.color}1e;color:${r.color};border:1px solid ${r.color}40;`;
        td.appendChild(chip);
      });
      break;}
    case 'prog':{
      const wrap=document.createElement('div');wrap.className='pbar-w';
      const bar=document.createElement('div');bar.className='pbar';
      const fill=document.createElement('div');fill.className='pbar-f'+(t.isCrit?' crit':'');
      fill.style.width=t.progress+'%';bar.appendChild(fill);
      const lbl=document.createElement('span');lbl.className='pct-lbl';lbl.textContent=t.progress+'%';
      wrap.appendChild(bar);wrap.appendChild(lbl);td.appendChild(wrap);break;}
    case 'cmt':td.textContent=t.comments||'';td.title=t.comments||'';break;
  }
}

// ═══ RENDERING: GANTT ═══
function renderTimeline(ps,nd){
  const me=document.getElementById('tl-months');
  const we=document.getElementById('tl-weeks');
  const de=document.getElementById('tl-days');
  [me,we,de].forEach(el=>{if(el)el.innerHTML='';});
  const showDays=DW>=14,showWeeks=DW>=6&&DW<14;
  if(we)we.style.display=showWeeks?'flex':'none';
  if(de)de.style.display=showDays?'flex':'none';
  let cm=-1,mel=null,mw=0,cwk=-1,wel=null,ww=0;
  for(let d=0;d<nd;d++){
    const s=addD(ps,d);const date=parse(s);
    const m=date.getUTCMonth(),y=date.getUTCFullYear(),dw=date.getUTCDay();
    const we2=dw===0||dw===6,isT=s===td0(),isH=isHol(s);
    // Month
    if(m!==cm){
      if(mel)mel.style.width=(mw*DW)+'px';
      cm=m;mw=0;mel=document.createElement('div');mel.className='tl-month';
      mel.textContent=MON[m]+(showDays?` ${y}`:`  ${y}`);
      me.appendChild(mel);
    }
    mw++;
    // Weeks row
    if(showWeeks&&we){
      const wn=isoWeek(s),wk=y*100+wn;
      if(wk!==cwk){
        if(wel)wel.style.width=(ww*DW)+'px';
        cwk=wk;ww=0;wel=document.createElement('div');
        wel.className='tl-week';wel.textContent='W'+wn;we.appendChild(wel);
      }
      ww++;
    }
    // Days row
    if(showDays&&de){
      const el=document.createElement('div');
      let cls='tld';
      if(isH)cls+=' hol';else if(we2)cls+=' we';
      if(isT)cls+=' tday';
      if(workMode==='work'&&(we2||isH)&&!isT)el.style.opacity='.3';
      el.className=cls;el.style.width=DW+'px';
      const wn=isoWeek(s);
      if(dw===1){
        el.innerHTML=`<span class="dn">${date.getUTCDate()}</span><span class="dd" style="color:var(--purple);font-size:8px">W${wn}</span>`;
      } else if(isH){
        const h=holidays.find(h=>h.date===s);
        el.title=h?h.name:'Holiday';
        el.innerHTML=`<span class="dn">${date.getUTCDate()}</span><span class="dd">🔴</span>`;
      } else {
        el.innerHTML=`<span class="dn">${date.getUTCDate()}</span><span class="dd">${DOW[dw]}</span>`;
      }
      de.appendChild(el);
    }
  }
  if(mel)mel.style.width=(mw*DW)+'px';
  if(wel)wel.style.width=(ww*DW)+'px';
}
function renderGantt(){
  if(curView!=='gantt'||!tasks.length)return;
  const rawPs=PS(),rawPe=PE();
  // Read zoom range from DOM inputs (not stale global vars)
  const ztS=document.getElementById('zt-s')?.value||'';
  const ztE=document.getElementById('zt-e')?.value||'';
  const ps=(ztS&&ztS>=rawPs&&ztS<rawPe)?ztS:rawPs;
  // IMPORTANT: always show at least up to PE+padding regardless of zoom end
  const fullPe=addD(rawPe,14);
  const pe=(ztE&&ztE>ps&&ztE<=fullPe)?ztE:fullPe;
  const nd=Math.max(1,diff(ps,pe)+1),tw=nd*DW;
  const vis=getVis();
  renderTimeline(ps,nd);
  // Sync #hdr-row height to #tl-wrap so task rows and gantt rows start at the same Y
  requestAnimationFrame(()=>{
    const tlWrap=document.getElementById('tl-wrap');
    const hdrRow=document.getElementById('hdr-row');
    if(tlWrap&&hdrRow){const h=tlWrap.offsetHeight;hdrRow.style.height=h+'px';}
  });
  const inner=document.getElementById('gantt-inner');if(!inner)return;
  // Keep SVG, remove old rows and markers
  [...inner.querySelectorAll('.grow,.today-l,.hol-l')].forEach(e=>e.remove());
  inner.style.width=tw+'px';inner.style.height=(vis.length*40)+'px';
  vis.forEach((t,ri)=>{
    const row=document.createElement('div');
    row.className='grow'+(t.isCrit?' crit-grow':'');
    row.style.width=tw+'px';
    // Draw bar
    const offS=diff(ps,t.start),calSpan=diff(t.start,t.end)+1,durPx=calSpan*DW;
    const barX=offS*DW,barW=Math.max(4,durPx-4);
    if(t.milestone){
      const b=document.createElement('div');
      b.className='gbar mile'+(t.id===selId?' sel':'');
      // Center the 16px diamond on the day column center
      b.style.left=(barX+DW/2-8)+'px';
      b.onclick=e=>{e.stopPropagation();sel(t.id);};
      b.ondblclick=()=>openTaskModal(t.id);
      b.oncontextmenu=e=>showQuickEdit(e,t.id);
      row.appendChild(b);
    } else {
      const barCls=hasKids(t.id)?'summ':t.isCrit?'crit':'norm';
      const b=document.createElement('div');
      b.className=`gbar ${barCls}`+(t.id===selId?' sel':'');
      b.style.left=barX+'px';b.style.width=barW+'px';
      // Progress overlay
      const done=document.createElement('div');
      done.className='gbar-done';
      done.style.left=(t.progress)+'%';done.style.width=(100-t.progress)+'%';
      b.appendChild(done);
      // Label
      if(DW>10){
        const lbl=document.createElement('div');lbl.className='gbar-lbl';lbl.textContent=t.name;b.appendChild(lbl);
      }
      b.onclick=e=>{e.stopPropagation();sel(t.id);};
      b.ondblclick=()=>openTaskModal(t.id);
      b.oncontextmenu=e=>showQuickEdit(e,t.id);
      row.appendChild(b);
    }
    inner.appendChild(row);
  });
  // Today line
  const todayOff=diff(ps,td0());
  if(todayOff>=0&&todayOff<nd){
    const tl=document.createElement('div');tl.className='today-l';tl.style.left=(todayOff*DW)+'px';inner.appendChild(tl);
  }
  // Holiday lines
  holidays.forEach(h=>{
    const off=diff(ps,h.date);if(off<0||off>=nd)return;
    const hl=document.createElement('div');hl.className='hol-l';hl.style.left=(off*DW+DW/2)+'px';hl.title=h.name;inner.appendChild(hl);
  });
  // Dependency arrows
  renderDeps(ps,nd,vis);
  syncScroll(vis.length);
}
function renderDeps(ps,nd,vis){
  const svg=document.getElementById('dep-svg');if(!svg)return;
  svg.innerHTML='';
  svg.setAttribute('width',nd*DW+'px');
  svg.setAttribute('height',vis.length*40+'px');
  const posMap=new Map();vis.forEach((t,i)=>posMap.set(t.id,i));
  vis.forEach(succ=>{
    (succ.preds||[]).forEach(p=>{
      const pred=GT(p.id);if(!pred)return;
      const pi=posMap.get(p.id),si=posMap.get(succ.id);
      if(pi===undefined||si===undefined)return;
      const x1=(diff(ps,pred.end)+1)*DW,y1=pi*40+20;
      const x2=diff(ps,succ.start)*DW+2,y2=si*40+20;
      const mx=x1+Math.max((x2-x1)/2,8);
      const path=document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d',`M${x1},${y1}L${mx},${y1}L${mx},${y2}L${x2},${y2}`);
      path.setAttribute('stroke','var(--purple)');path.setAttribute('stroke-width','1.5');path.setAttribute('fill','none');path.setAttribute('opacity','.7');
      svg.appendChild(path);
      // Arrowhead
      const arr=document.createElementNS('http://www.w3.org/2000/svg','polygon');
      arr.setAttribute('points',`${x2},${y2} ${x2-8},${y2-4} ${x2-8},${y2+4}`);
      arr.setAttribute('fill','var(--purple)');arr.setAttribute('opacity','.7');
      svg.appendChild(arr);
      // Lag badge
      if(p.lag){
        const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
        txt.setAttribute('x',mx);txt.setAttribute('y',Math.min(y1,y2)-2);
        txt.setAttribute('text-anchor','middle');txt.setAttribute('font-size','9');
        txt.setAttribute('fill','var(--purple)');txt.textContent=(p.lag>0?'+':'')+p.lag+'d';
        svg.appendChild(txt);
      }
    });
  });
}
function syncScroll(cnt){
  const tb=document.getElementById('task-body'),gs=document.getElementById('gantt-scroll');if(!tb||!gs)return;
  let lk=false;
  tb.onscroll=()=>{if(lk)return;lk=true;gs.scrollTop=tb.scrollTop;lk=false;};
  gs.onscroll=()=>{
    if(lk)return;lk=true;tb.scrollTop=gs.scrollTop;
    const sl=gs.scrollLeft;
    ['tl-months','tl-weeks','tl-days'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.marginLeft=-sl+'px';});
    lk=false;
  };
}

// Visibility for summary respecting sumCollapsed
function isSumHidden(id){
  const i=tIdx(id);if(i<0||tasks[i].level===0)return false;
  let lv=tasks[i].level;
  for(let j=i-1;j>=0;j--){
    if(tasks[j].level<lv){
      if(sumCollapsed.has(tasks[j].id))return true;
      if(tasks[j].level===0)return false;
      lv=tasks[j].level;
    }
  }
  return false;
}

function buildSumRuler(){
  const ruler=document.getElementById('sum-ruler');if(!ruler||!tasks.length)return;
  ruler.innerHTML='';
  const ps=PS(),pe=PE(),totalD=Math.max(1,diff(ps,pe)+1);
  const todayPct=Math.min(100,Math.max(0,diff(ps,td0())/totalD*100));
  const tl=document.createElement('div');tl.style.cssText=`position:absolute;top:0;bottom:0;left:${todayPct}%;width:2px;background:var(--green);opacity:.6;z-index:2`;ruler.appendChild(tl);
  // ── Adaptive granularity by project duration ──
  // weeks (<120d) · months (<540d) · quarters/trimesters (<1100d) · semesters (>=1100d)
  let mode;
  if(totalD<=120)mode='weeks';
  else if(totalD<=540)mode='months';
  else if(totalD<=1100)mode='quarters';
  else mode='semesters';
  const scaleLbl=document.getElementById('sum-scale-lbl');
  if(scaleLbl)scaleLbl.textContent={weeks:'(weeks)',months:'(months)',quarters:'(quarters)',semesters:'(semesters)'}[mode];
  const addMark=(dateStr,label)=>{
    const pct=diff(ps,dateStr)/totalD*100;
    if(pct<-1||pct>101)return;
    const mk=document.createElement('div');mk.className='sum-ruler-mark';mk.style.left=pct+'%';mk.textContent=label;ruler.appendChild(mk);
    const tk=document.createElement('div');tk.className='sum-ruler-tick';tk.style.left=pct+'%';ruler.appendChild(tk);
  };
  if(mode==='weeks'){
    // Mark each Monday with week number
    let d=parse(ps);
    // advance to first Monday
    while(d.getUTCDay()!==1&&fmt(d)<=pe)d.setUTCDate(d.getUTCDate()+1);
    while(fmt(d)<=pe){addMark(fmt(d),'W'+isoWeek(fmt(d)));d.setUTCDate(d.getUTCDate()+7);}
  } else if(mode==='months'){
    let d=parse(ps);d.setUTCDate(1);
    while(fmt(d)<=pe){if(fmt(d)>=ps)addMark(fmt(d),MON[d.getUTCMonth()]+(d.getUTCMonth()===0?" '"+String(d.getUTCFullYear()).slice(2):''));d.setUTCMonth(d.getUTCMonth()+1);}
  } else if(mode==='quarters'){
    let d=parse(ps);d.setUTCDate(1);d.setUTCMonth(Math.floor(d.getUTCMonth()/3)*3);
    while(fmt(d)<=pe){const q=Math.floor(d.getUTCMonth()/3)+1;if(fmt(d)>=addD(ps,-90))addMark(fmt(d),'Q'+q+" '"+String(d.getUTCFullYear()).slice(2));d.setUTCMonth(d.getUTCMonth()+3);}
  } else {
    let d=parse(ps);d.setUTCDate(1);d.setUTCMonth(d.getUTCMonth()<6?0:6);
    while(fmt(d)<=pe){const h=d.getUTCMonth()<6?1:2;if(fmt(d)>=addD(ps,-180))addMark(fmt(d),'H'+h+" '"+String(d.getUTCFullYear()).slice(2));d.setUTCMonth(d.getUTCMonth()+6);}
  }
}

// ═══ RENDERING: ANALYSIS ═══
function renderAnalysis(){
  const el=document.getElementById('analysis-content');if(!el||curView!=='analysis')return;
  if(!baseline){el.innerHTML='<div style="color:var(--dim);padding:32px;text-align:center">No baseline captured. Activate Project Mode in Settings to begin tracking.</div>';return;}
  buildCompGantt(el);
}
function buildCompGantt(el){
  const ps2=tasks.reduce((m,t)=>{const b=baseline.find(x=>x.id===t.id);const bS=b?b.start:t.start;return bS<m?bS:m;},'9999-99-99');
  const pe2=tasks.reduce((m,t)=>{const b=baseline.find(x=>x.id===t.id);const bE=b?b.end:t.end;return bE>m?bE:m;},'0000-00-00');
  const ps=addD(ps2,-2),pe=addD(pe2,14);
  const nd=Math.max(1,diff(ps,pe)+1),cdw=Math.max(8,Math.min(24,Math.floor(800/nd)));
  const entries=tasks.map(t=>{
    const b=baseline.find(x=>x.id===t.id)||null;
    const changes=changeLog.filter(c=>c.taskId===t.id&&['start','end','duration','pred'].includes(c.field));
    const netImpact=changes.reduce((s,c)=>s+(c.impactDays||0),0);
    const endDelta=b?diff(b.end,t.end):0;
    const startDelta=b?diff(b.start,t.start):0;
    return{t,b,changes,netImpact,endDelta,startDelta};
  });
  // KPIs
  const totalCh=changeLog.length;
  const delays=changeLog.filter(c=>(c.impactDays||0)>0).length;
  const gains=changeLog.filter(c=>(c.impactDays||0)<0).length;
  const net=changeLog.reduce((s,c)=>s+(c.impactDays||0),0);
  el.innerHTML=`
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">
    <div class="kpi"><div class="kpi-val">${totalCh}</div><div class="kpi-lbl">Total Changes</div></div>
    <div class="kpi"><div class="kpi-val red">${delays}</div><div class="kpi-lbl">Delays</div></div>
    <div class="kpi"><div class="kpi-val green">${gains}</div><div class="kpi-lbl">Gains</div></div>
    <div class="kpi"><div class="kpi-val ${net>0?'red':'green'}">${net>0?'+':''}${net}d</div><div class="kpi-lbl">Net Impact</div></div>
  </div>
  <div class="section-title">🔎 Baseline vs Current</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;font-size:11px">
    <span>━ <span style="color:rgba(90,148,144,.7)">Baseline</span></span>
    <span>━ <span style="color:var(--teal)">On Time</span></span>
    <span>━ <span style="color:var(--red)">Delay</span></span>
    <span>━ <span style="color:var(--green)">Gain</span></span>
    <span style="border:1px dashed rgba(244,97,110,.5);padding:0 4px">Cascaded delay</span>
    <span style="border:1px dashed rgba(61,214,140,.5);padding:0 4px">Cascaded gain</span>
  </div>
  <div id="cg-wrap" style="overflow-x:auto;"></div>
  <div class="section-title" style="margin-top:16px">📋 Change Log (${totalCh} entries)</div>
  <div id="cg-log"></div>`;
  buildCGRows(document.getElementById('cg-wrap'),entries,ps,pe,nd,cdw);
  buildCGLog(document.getElementById('cg-log'));
}
function buildCGRows(wrap,entries,ps,pe,nd,cdw){
  if(!wrap)return;
  const reasonMap=new Map();changeLog.forEach(c=>{if(c.reasonId&&!reasonMap.has(c.reasonId)){const r=delayReasons.find(x=>x.id===c.reasonId);if(r)reasonMap.set(c.reasonId,r.label);}});
  let rn=1;const reasonNums=new Map();changeLog.forEach(c=>{if(c.reasonId&&!reasonNums.has(c.reasonId))reasonNums.set(c.reasonId,rn++);});
  entries.forEach(({t,b,changes,netImpact,endDelta,startDelta})=>{
    const isDir=changes.length>0;
    let cls='no-base';
    if(b){
      if(isDir){cls=netImpact<0?'ahead':netImpact>0?'delayed':'on-time';}
      else{cls=endDelta>=1?'casc-delay':endDelta<=-1?'casc-ahead':'on-time';}
    }
    const isCollapsed=compCollapsed.has(t.id);
    const isHide=isCompHidden(t.id);
    const row=document.createElement('div');
    row.className='cg-row'+(isHide?' cg-hidden':'');
    // Label
    const lbl=document.createElement('div');lbl.className='cg-label';
    const nm=document.createElement('div');nm.className=`cg-label-name l${Math.min(t.level,2)}`;
    if(hasKids(t.id)){const tog=document.createElement('span');tog.className='cg-toggle';tog.textContent=isCollapsed?'▶':'▼';tog.onclick=e=>{e.stopPropagation();if(compCollapsed.has(t.id))compCollapsed.delete(t.id);else compCollapsed.add(t.id);renderAnalysis();};nm.appendChild(tog);}
    nm.appendChild(document.createTextNode(t.name));
    lbl.appendChild(nm);
    // Delta label
    const dl=document.createElement('div');dl.className='cg-label-delta';
    if(b){
      const v=isDir?netImpact:endDelta;
      dl.style.color=v<0?'var(--green)':v>0?'var(--red)':'var(--teal)';
      dl.textContent=v>0?`▲ +${v}d`:v<0?`▼ ${v}d`:'✓';
      if(!isDir&&v!==0)dl.style.opacity='.7';
    }
    lbl.appendChild(dl);
    row.appendChild(lbl);
    // Bars
    const bars=document.createElement('div');bars.className='cg-bars';bars.style.position='relative';
    if(b){
      const bs=diff(ps,b.start)*cdw,bw=Math.max(8,(diff(b.start,b.end)+1)*cdw-2);
      const base=document.createElement('div');base.className='cg-bar-base';base.style.left=bs+'px';base.style.width=bw+'px';bars.appendChild(base);
    }
    const cs=diff(ps,t.start)*cdw,cw=Math.max(4,t.milestone?14:(diff(t.start,t.end)+1)*cdw-2);
    const cur=document.createElement('div');cur.className=`cg-bar-cur ${cls}`;cur.style.left=cs+'px';cur.style.width=cw+'px';
    // Reason badge
    if(isDir&&changes.length){const c=changes[changes.length-1];if(c.reasonId&&reasonNums.has(c.reasonId)){const badge=document.createElement('div');badge.className='cg-reason-badge';badge.style.left=(cs+cw+2)+'px';badge.textContent=reasonNums.get(c.reasonId);bars.appendChild(badge);}}
    bars.appendChild(cur);
    row.appendChild(bars);
    wrap.appendChild(row);
  });
}
function buildCGLog(el){
  if(!el||!changeLog.length){if(el)el.innerHTML='<div style="color:var(--dim);font-size:12px;padding:8px">No changes logged.</div>';return;}
  el.innerHTML='';
  [...changeLog].reverse().forEach(c=>{
    const r=delayReasons.find(x=>x.id===c.reasonId);
    const impact=c.impactDays||0;
    const row=document.createElement('div');
    row.style.cssText=`background:var(--card);border:1px solid var(--border);border-left:4px solid ${impact>0?'var(--red)':impact<0?'var(--green)':'var(--border)'};border-radius:6px;padding:10px 12px;margin-bottom:6px;font-size:12px;`;

function isCompHidden(id){
  const i=tIdx(id);if(i<0||tasks[i].level===0)return false;
  let lv=tasks[i].level;
  for(let j=i-1;j>=0;j--){
    if(tasks[j].level<lv){
      if(compCollapsed.has(tasks[j].id))return true;
      if(tasks[j].level===0)return false;
      lv=tasks[j].level;
    }
  }
  return false;
}

function openMoveCombo(){filtMoveCombo();document.getElementById('move-drop')?.classList.add('open');}

function filtMoveCombo(){
  const inp=document.getElementById('move-inp');
  const drop=document.getElementById('move-drop');
  if(!inp||!drop)return;
  const q=inp.value.trim().toLowerCase().replace('#','');
  // The # column shows the VISIBLE ROW NUMBER (1,2,3…). Match on that primarily.
  const vis=getVis();
  const rowMap=new Map();vis.forEach((t,i)=>rowMap.set(t.id,i+1));
  // Build list ordered by row number, matching on row# (exact/prefix) or name
  const opts=vis.filter(t=>{
    if(!q)return true;
    const rn=String(rowMap.get(t.id)||'');
    return rn===q||rn.startsWith(q)||t.name.toLowerCase().includes(q);
  }).slice(0,40);
  drop.innerHTML='';
  if(!opts.length){drop.innerHTML='<div class="combo-empty">No matching row #</div>';drop.classList.add('open');return;}
  opts.forEach(t=>{
    const opt=document.createElement('div');opt.className='combo-opt';
    const rn=rowMap.get(t.id);
    // Row number is the prominent badge (matches the # column the user sees)
    opt.innerHTML=`<span class="oid" style="background:var(--teal);color:#fff">#${rn}</span><span>${'　'.repeat(t.level)}${t.name}</span>`;
    opt.onmousedown=()=>{
      const tgt=document.getElementById('move-target');if(tgt)tgt.value=t.id;
      inp.value=`#${rn} ${t.name}`;drop.classList.remove('open');
    };
    drop.appendChild(opt);
  });
  drop.classList.add('open');
}
function doMoveTask(taskId){
  const tgt=parseInt(document.getElementById('move-target')?.value);
  if(!tgt||isNaN(tgt)){showToast('⚠ Select a target task first');return;}
  if(tgt===taskId){showToast('⚠ Cannot move below itself');return;}
  // Cannot move below own descendant
  const block=[taskId,...getDesc(taskId)];
  if(block.includes(tgt)){showToast('⚠ Cannot move below own subtask');return;}
  saveUndo();
  // Capture the block tasks (preserve their full objects incl. preds/lag)
  const blockTasks=block.map(id=>GT(id)).filter(Boolean);
  // Remove the block from tasks
  tasks=tasks.filter(t=>!block.includes(t.id));
  // Recompute target position AFTER removal
  const targetIdx=tasks.findIndex(t=>t.id===tgt);
  if(targetIdx<0){tasks.push(...blockTasks);}
  else{
    // Insert after target + its descendants (descendants computed on the new array)
    let lv=tasks[targetIdx].level,insertAt=targetIdx+1;
    while(insertAt<tasks.length&&tasks[insertAt].level>lv)insertAt++;
    tasks.splice(insertAt,0,...blockTasks);
  }
  recalc();markDirty();closeModal();render();
  showToast('↕ Task moved (attributes preserved)');
}

function saveTask(id,resOnly=false){
  saveUndo();
  const ar=(resources||[]).filter(r=>document.getElementById('rat-'+r.id)?.classList.contains('on')).map(r=>({id:r.id,units:100}));
  if(resOnly){const t=GT(id);if(t){t.resources=ar;markDirty();}closeModal();render();return;}
  const name=document.getElementById('mn')?.value.trim();if(!name){showToast('⚠ Task name required');return;}
  const s=document.getElementById('ms')?.value||td0();
  const f=document.getElementById('mf')?.value;
  const mil=document.getElementById('mm')?.value==='1';
  const lv=parseInt(document.getElementById('ml')?.value)||0;
  const prog=Math.max(0,Math.min(100,parseInt(document.getElementById('mp')?.value)||0));
  const cmt=document.getElementById('mcmt')?.value||'';
  // Duration: always derive from start+finish when both present (use calendarToWork)
  let dur;
  if(mil){dur=1;}
  else if(f&&f>=s){dur=calendarToWork(s,f);}
  else{dur=Math.max(1,parseInt(document.getElementById('md')?.value)||1);}
  // Predecessors from hidden inputs
  const newPreds=[];
  document.querySelectorAll('.pred-row').forEach(row=>{
    const pv=row.querySelector('input[type=hidden]');
    const pl=row.querySelector('input[type=number]');
    if(!pv||!pv.value)return;
    const pid=parseInt(pv.value);const lag=parseInt(pl?.value||0)||0;
    if(!isNaN(pid)&&pid!==(id==='null'?-1:parseInt(id)))newPreds.push({id:pid,lag});
  });
  const taskId=id===null||id==='null'?null:id;
  const existing=taskId?GT(taskId):null;
  if(!existing){
    // New task
    const nt={id:ntid++,name,level:lv,duration:dur,start:s,end:schedAddD(s,dur-1),
      preds:newPreds,resources:ar,progress:prog,milestone:mil,comments:cmt,isCrit:false,slack:0};
    if(selId&&tIdx(selId)>=0){const si=tIdx(selId);tasks.splice(si+1+getDesc(selId).length,0,nt);}
    else tasks.push(nt);
    closeModal();recalc();markDirty();render();return;
  }
  // Existing — check if schedule changed
  const userChangedStart=s!==existing.start;
  const userChangedDur=dur!==existing.duration;
  const userChangedPreds=JSON.stringify(newPreds)!==JSON.stringify(existing.preds||[]);
  const schedChanged=projectMode&&(userChangedStart||userChangedDur||userChangedPreds)&&!hasKids(taskId);
  if(schedChanged){
    // Compute local impact
    let impact=0;
    if(userChangedDur)impact=dur-existing.duration;
    else if(userChangedStart)impact=diff(existing.start,s);
    const b=baseline?.find(x=>x.id===taskId);
    const overrideImpact=b?diff(b.end,schedAddD(s,dur-1)):impact;
    existing.name=name;existing.level=lv;existing.progress=prog;existing.milestone=mil;existing.resources=ar;existing.comments=cmt;
    if(hasKids(taskId)){existing.preds=newPreds;recalc();closeModal();markDirty();render();return;}
    closeModal();
    openReasonModal(taskId,existing.name,'schedule',userChangedDur?'duration':userChangedStart?'start':'pred',
      userChangedDur?String(existing.duration):existing.start,
      userChangedDur?String(dur):s,
      ()=>{Object.assign(existing,{start:s,end:schedAddD(s,dur-1),duration:dur,preds:newPreds});recalc();markDirty();render();},
      overrideImpact);
    return;
  }
  // Non-schedule changes or config mode
  const applyFn=()=>{
    Object.assign(existing,{name,level:lv,duration:dur,start:s,end:schedAddD(s,dur-1),preds:newPreds,resources:ar,progress:prog,milestone:mil,comments:cmt});
    recalc();closeModal();markDirty();render();
  };
  applyFn();
}

function openReasonModal(taskId,taskName,type,field,oldVal,newVal,applyFn,overrideImpact){
  const impact=overrideImpact!==undefined?overrideImpact:0;
  const isGain=impact<0;const isDelay=impact>0;

  const chips=delayReasons.map(r=>`<button class="rchip-btn" id="rc-${r.id}" onclick="document.querySelectorAll('.rchip-btn').forEach(x=>x.classList.remove('sel'));this.classList.add('sel')">${r.label}</button>`).join('');

      <textarea id="reason-notes" class="minp" rows="2" style="resize:vertical"></textarea>

      <button class="hbtn danger" onclick="closeModal();render()">Cancel Change</button>
      <div class="spacer"></div>
      <button class="hbtn pri" onclick="confirmReason(${taskId},'${field}','${encodeURIComponent(oldVal)}','${encodeURIComponent(newVal)}',${impact})">✓ Confirm & Log</button>
    </div>`;
  document.getElementById('overlay').classList.add('show');

  window._pendingApply=applyFn;
}
function confirmReason(taskId,field,oldValEnc,newValEnc,impact){
  const sel=document.querySelector('.rchip-btn.sel');
  if(!sel){showToast('⚠ Please select a reason');return;}
  const rid=parseInt(sel.id.replace('rc-',''));
  const r=delayReasons.find(x=>x.id===rid);
  const notes=document.getElementById('reason-notes')?.value||'';
  const oldVal=decodeURIComponent(oldValEnc),newVal=decodeURIComponent(newValEnc);
  const entry={id:changeIdSeq++,timestamp:new Date().toISOString(),taskId,taskName:GT(taskId)?.name||'',field,oldVal,newVal,impactDays:impact,reasonId:rid,reason:r?.label||'',reasonCategory:r?.cat||'',notes};
  changeLog.push(entry);
  const b=baseline?.find(x=>x.id===taskId);
  if(b){entry.baselineStart=b.start;entry.baselineEnd=b.end;}
  if(window._pendingApply){window._pendingApply();window._pendingApply=null;}
  closeModal();markDirty();renderAnalysis();
}

function sel(id){selId=(selId===id)?null:id;renderTable();renderGantt();}
function delTask(id){
  saveUndo();
  if(hasKids(id)&&!confirm(`Delete "${GT(id)?.name}" and all its subtasks?`))return;
  const descs=[id,...getDesc(id)];tasks=tasks.filter(t=>!descs.includes(t.id));
  tasks.forEach(t=>t.preds=(t.preds||[]).filter(p=>!descs.includes(p.id)));
  if(selId&&descs.includes(selId))selId=null;
  recalc();markDirty();render();
}
function moveTask(id,dir){
  saveUndo();const i=tIdx(id);if(i<0)return;
  const block=[id,...getDesc(id)];const len=block.length;
  if(dir<0&&i>0){
    const prev=tasks[i-1];if(isAnc(prev.id,id))return;
    tasks.splice(i-1,0,...tasks.splice(i,len));
  } else if(dir>0){
    const nxt=tasks[i+len];if(!nxt)return;if(isAnc(id,nxt.id))return;
    const nxtBlock=[nxt.id,...getDesc(nxt.id)];
    tasks.splice(i,0,...tasks.splice(i+len,nxtBlock.length));
  }
  recalc();markDirty();render();
}
function insertAbove(id){
  const i=tIdx(id);if(i<0)return;
  const ref=tasks[i];
  const nt={id:ntid++,name:'New Task',level:ref.level,duration:5,start:ref.start,end:schedAddD(ref.start,4),preds:[],resources:[],progress:0,milestone:false,comments:'',isCrit:false,slack:0};
  tasks.splice(i,0,nt);recalc();markDirty();render();selId=nt.id;setTimeout(()=>openTaskModal(nt.id),80);
}
function insertBelow(id){
  const i=tIdx(id);if(i<0)return;
  const ref=tasks[i];const isP=hasKids(ref.id);
  const newLv=Math.min(5,isP?ref.level+1:ref.level);
  const ins=isP?i+1+getDesc(id).length:i+1;
  const nt={id:ntid++,name:'New Task',level:newLv,duration:5,start:ref.start,end:schedAddD(ref.start,4),preds:[],resources:[],progress:0,milestone:false,comments:'',isCrit:false,slack:0};

function saveJSON(){
  const proj=document.getElementById('proj-inp')?.value||'project';
  const data={version:6,projectName:proj,exportedAt:new Date().toISOString(),tasks,resources,changeLog,baseline,delayReasons,holidays,meta:{ntid,nrid,DW,collapsed:[...collapsed],projectMode,changeIdSeq,reasonSeq,workMode}};
  window.parent.postMessage({ action: 'save', data: data }, '*');
  markClean();showToast('💾 Saved to Web App');
}
function loadJSON(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.tasks||!d.resources)throw new Error('Invalid file');
      // Load tasks with preds normalised to {id,lag} but WITHOUT filtering yet
      tasks=d.tasks.map(t=>({comments:'',isCrit:false,slack:0,...t,
        preds:(t.preds||[]).map(p=>typeof p==='number'?{id:p,lag:0}:{id:p.id,lag:p.lag||0})}));
      // Now that tasks[] is populated, drop any preds pointing to missing tasks
      tasks.forEach(t=>{t.preds=t.preds.filter(p=>tasks.some(x=>x.id===p.id));});
      resources=d.resources;changeLog=d.changeLog||[];baseline=d.baseline||null;
      delayReasons=d.delayReasons||[...DEF_REASONS];holidays=d.holidays||[];
      workMode=d.meta?.workMode||'full';DW=d.meta?.DW||28;
      ntid=d.meta?.ntid||Math.max(0,...tasks.map(t=>t.id))+1;
      nrid=d.meta?.nrid||Math.max(0,...resources.map(r=>r.id))+1;
      collapsed=new Set(d.meta?.collapsed||[]);projectMode=d.meta?.projectMode||false;
      changeIdSeq=d.meta?.changeIdSeq||1;reasonSeq=d.meta?.reasonSeq||13;
      document.getElementById('proj-inp').value=d.projectName||'Loaded';
      updateModeBadge();recalc();markClean();render();initZoom();
      document.getElementById('startup').style.display='none';showToast('📂 Loaded: '+d.projectName);
    }catch(err){showToast('⚠ Load failed: '+err.message);}
    input.value='';
  };reader.readAsText(file);
}

function importXL(input){

  const reader=new FileReader();
  reader.onload=e=>{

      const hdrs=raw[0].map(h=>String(h||'').trim());
      const ci=k=>hdrs.indexOf(k);
      const fmtD=v=>{if(!v)return'';if(v instanceof Date){const y=v.getFullYear(),m=v.getMonth()+1,d2=v.getDate();return`${y}-${String(m).padStart(2,'0')}-${String(d2).padStart(2,'0')}`;}const s=String(v).trim();if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;const n=parseFloat(s);if(!isNaN(n)&&n>40000){const d3=new Date((n-25569)*86400*1000);return fmt(d3);}return parseUD(s)||'';};
      const newTasks=[];
      for(let i=1;i<raw.length;i++){
        const r=raw[i];const nm=String(r[ci('Task Name')]||'').trim();if(!nm)continue;

        const mil=milRaw==='1'||milRaw==='true'||milRaw==='yes';
        newTasks.push({id:i,name:nm,level:Math.min(5,Math.max(0,parseInt(r[ci('Level')])||0)),
          duration:mil?1:dur,start,end:addD(start,mil?0:dur-1),
          preds:parsePredStr(String(r[ci('Predecessors')]||'')),resources:[],
          progress:Math.max(0,Math.min(100,parseInt(r[ci('Progress (%)')] || 0))),
          milestone:mil,comments:String(r[ci('Comments')]||''),isCrit:false,slack:0});
      }
      // Guarantee unique sequential IDs
      const idMap=new Map();newTasks.forEach((t,i)=>{idMap.set(t.id,i+1);t.id=i+1;});
      newTasks.forEach(t=>{t.preds=t.preds.map(p=>({...p,id:idMap.get(p.id)||p.id})).filter(p=>newTasks.find(x=>x.id===p.id));});
      // Resources
      let newRes=[];const DCOLS2=DEF_COLORS;
      if(wb.SheetNames.includes('Resources')){
        const rraw=XLSX.utils.sheet_to_json(wb.Sheets['Resources'],{header:1,defval:''});
        const rh=rraw[0]?.map(h=>String(h||'').trim())||[];const rc=k=>rh.indexOf(k);
        for(let i=1;i<rraw.length;i++){const r=rraw[i];const nm=String(r[rc('Name')]||'').trim();if(!nm)continue;const col=String(r[rc('Color')]||'').trim();newRes.push({id:parseInt(r[rc('ID')])||i,name:nm,role:String(r[rc('Role')]||'Engineer'),color:/^#[0-9a-fA-F]{6}$/.test(col)?col:DCOLS2[newRes.length%DCOLS2.length]});}
      }
      if(!newRes.length){const seen=new Map();for(let i=1;i<raw.length;i++){String(raw[i][ci('Resources')]||'').split(',').forEach(n=>{n=n.trim();if(n&&!seen.has(n.toLowerCase()))seen.set(n.toLowerCase(),{id:seen.size+1,name:n,role:'Engineer',color:DCOLS2[seen.size%DCOLS2.length]});});}newRes=[...seen.values()];}
      const rmap=new Map();newRes.forEach(r=>rmap.set(r.name.toLowerCase(),r.id));
      for(let i=1;i<raw.length;i++){const ti=i-1;if(ti>=newTasks.length)break;String(raw[i][ci('Resources')]||'').split(',').forEach(n=>{n=n.trim();const rid=rmap.get(n.toLowerCase());if(rid)newTasks[ti].resources.push({id:rid,units:100});});}
      tasks=newTasks;resources=newRes;ntid=tasks.length+1;nrid=Math.max(0,...newRes.map(r=>r.id))+1;
      recalc();markClean();collapsed=new Set();render();initZoom();
      document.getElementById('startup').style.display='none';showToast('📂 Imported '+tasks.length+' tasks');
    }catch(err){showToast('⚠ Import error: '+err.message);console.error(err);}
    input.value='';
  };reader.readAsArrayBuffer(file);
}

// ════════════════════════════════════════════════════════════
// PLANNING COMPARATOR
// ════════════════════════════════════════════════════════════
let cmpVersions=[];      // [{fname,projectName,exportedAt,tasks,resources}]
let cmpActiveTrans=0;    // which version transition is shown in detail
let cmpChangeFilter='all';
let cmpEvoTask=null;

function loadCmpFiles(input){
  const files=[...input.files];
  if(!files.length)return;
  let loaded=0,rejected=0,rejectMsg='';
  let pending=files.length;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const d=JSON.parse(e.target.result);
        if(!d.tasks||!Array.isArray(d.tasks))throw new Error('Not a planning file');
        const ver={fname:file.name,projectName:d.projectName||file.name,
          exportedAt:d.exportedAt||new Date().toISOString(),
          tasks:d.tasks,resources:d.resources||[]};
        // Validate same project against the first loaded version
        if(cmpVersions.length>0 && !sameProject(cmpVersions[0],ver)){
          rejected++;rejectMsg='Please use files from the same project';
        } else if(cmpVersions.length>=2){
          rejected++;rejectMsg='Only 2 versions can be compared (before & after). Clear to load a new pair.';
        } else {
          // Avoid exact duplicates (same exportedAt + name)
          if(!cmpVersions.some(v=>v.exportedAt===ver.exportedAt&&v.fname===ver.fname)){
            cmpVersions.push(ver);loaded++;
          }
        }
      }catch(err){rejected++;rejectMsg='Invalid file: '+file.name;}
      if(--pending===0){
        // Sort chronologically by exportedAt
        cmpVersions.sort((a,b)=>a.exportedAt.localeCompare(b.exportedAt));
        cmpActiveTrans=Math.max(0,cmpVersions.length-2);
        renderComparator(rejected?rejectMsg:'');
        if(loaded)showToast(`⚖ ${loaded} version(s) loaded`);
        if(rejected)showToast('⚠ '+rejectMsg);
      }
    };
    reader.readAsText(file);
  });
  input.value='';
}

// Determine if two saved plannings are the same project
function sameProject(a,b){
  const pnA=(a.projectName||'').toLowerCase().trim();
  const pnB=(b.projectName||'').toLowerCase().trim();
  if(pnA&&pnB&&pnA===pnB)return true;
  const setA=new Set((a.tasks||[]).map(t=>(t.name||'').toLowerCase().trim()).filter(Boolean));
  const setB=new Set((b.tasks||[]).map(t=>(t.name||'').toLowerCase().trim()).filter(Boolean));
  if(!setA.size||!setB.size)return false;
  let inter=0;setA.forEach(n=>{if(setB.has(n))inter++;});
  const jac=inter/(setA.size+setB.size-inter);
  return jac>=0.3;
}

function removeCmpVersion(idx){
  cmpVersions.splice(idx,1);
  cmpActiveTrans=Math.max(0,Math.min(cmpActiveTrans,cmpVersions.length-2));
  renderComparator('');
}
function clearCmp(){cmpVersions=[];renderComparator('');}

// ── Version metrics ──
function cmpHasKids(tasks,id){
  const i=tasks.findIndex(t=>t.id===id);if(i<0)return false;
  const lv=tasks[i].level;
  for(let j=i+1;j<tasks.length;j++){if(tasks[j].level<=lv)return false;if(tasks[j].level>lv)return true;}
  return false;
}
function cmpMetrics(v){
  const tasks=v.tasks||[];
  if(!tasks.length)return{start:'',end:'',span:0,count:0,miles:0,progress:0,crit:0};
  const start=tasks.reduce((m,t)=>t.start<m?t.start:m,tasks[0].start);
  const end=tasks.reduce((m,t)=>t.end>m?t.end:m,tasks[0].end);
  const leaves=tasks.filter(t=>!cmpHasKids(tasks,t.id)&&!t.milestone);
  const tot=leaves.reduce((s,t)=>s+(t.duration||0),0);
  const done=leaves.reduce((s,t)=>s+(t.duration||0)*((t.progress||0)/100),0);
  return{start,end,span:diff(start,end)+1,count:tasks.length,
    miles:tasks.filter(t=>t.milestone).length,
    progress:tot?Math.round(done/tot*100):0,
    crit:tasks.filter(t=>t.isCrit).length};
}
function cmpPredStr(preds){return(preds||[]).map(p=>typeof p==='number'?p:`${p.id}${p.lag?(p.lag>0?'+':'')+p.lag:''}`).sort().join(',');}
function cmpResStr(t){return(t.resources||[]).map(r=>r.id).sort().join(',');}

// ── Diff two versions ──
function diffVersions(v1,v2){
  const m1=new Map(v1.tasks.map(t=>[t.id,t]));
  const m2=new Map(v2.tasks.map(t=>[t.id,t]));
  const added=[],removed=[],changed=[];
  m2.forEach((t,id)=>{if(!m1.has(id))added.push(t);});
  m1.forEach((t,id)=>{if(!m2.has(id))removed.push(t);});
  m2.forEach((t2,id)=>{
    const t1=m1.get(id);if(!t1)return;
    const diffs=[];
    if(t1.name!==t2.name)diffs.push({f:'name',from:t1.name,to:t2.name});
    if(t1.start!==t2.start)diffs.push({f:'start',from:fedit(t1.start),to:fedit(t2.start)});
    if(t1.end!==t2.end)diffs.push({f:'finish',from:fedit(t1.end),to:fedit(t2.end)});
    if(t1.duration!==t2.duration)diffs.push({f:'duration',from:t1.duration+'d',to:t2.duration+'d'});
    if((t1.progress||0)!==(t2.progress||0))diffs.push({f:'progress',from:(t1.progress||0)+'%',to:(t2.progress||0)+'%'});
    if(cmpPredStr(t1.preds)!==cmpPredStr(t2.preds))diffs.push({f:'predecessors',from:cmpPredStr(t1.preds)||'—',to:cmpPredStr(t2.preds)||'—'});
    if(cmpResStr(t1)!==cmpResStr(t2))diffs.push({f:'resources',from:'changed',to:'changed'});
    if(diffs.length){
      const endImpact=(t1.end&&t2.end)?diff(t1.end,t2.end):0;
      changed.push({id,name:t2.name,diffs,endImpact,milestone:t2.milestone});
    }
  });
  return{added,removed,changed};
}
