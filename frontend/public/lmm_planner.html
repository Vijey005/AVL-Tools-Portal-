    <button class="hbtn pri" onclick="document.getElementById('cmp-input').click()">📂 Load 2 versions</button>
    ${cmpVersions.length?`<button class="hbtn" onclick="clearCmp()" style="margin-left:6px">Clear all</button>`:''}

  // ── KPIs across the full span (V1 → last) ──
  const first=cmpVersions[0],last=cmpVersions[cmpVersions.length-1];
  const mFirst=cmpMetrics(first),mLast=cmpMetrics(last);
  const fullDiff=diffVersions(first,last);
  const endSlip=diff(mFirst.end,mLast.end);
  const totalChanges=cmpVersions.slice(1).reduce((s,v,i)=>{const d=diffVersions(cmpVersions[i],v);return s+d.added.length+d.removed.length+d.changed.length;},0);

  // ── Current Status Report (as per latest planning, up to today) ──
  html2+=`<div class="cmp-section"><h3>📊 Current Status Report — as of ${fedit(td0())} (latest planning)</h3><div id="cmp-status"></div></div>`;

  // ── Project Evolution chart ──

  html2+=`<div class="cmp-section"><h3>🔀 Changes Between Versions</h3>

        <option value="">— Select a task to trace across versions —</option>

// ── Evolution line chart (SVG) ──
function drawCmpEvoChart(){
  const host=document.getElementById('cmp-evo-chart');if(!host)return;
  const metrics=cmpVersions.map(cmpMetrics);
  const W=Math.max(560,cmpVersions.length*140),H=220,padL=60,padR=20,padT=20,padB=40;
  const plotW=W-padL-padR,plotH=H-padT-padB;
  // Finish dates → days from earliest start
  const baseStart=metrics.reduce((m,x)=>x.start&&x.start<m?x.start:m,metrics[0].start);
  const ends=metrics.map(m=>diff(baseStart,m.end));
  const maxEnd=Math.max(...ends,1),minEnd=Math.min(...ends,0);
  const range=Math.max(1,maxEnd-minEnd);
  const xAt=i=>padL+(cmpVersions.length===1?plotW/2:i/(cmpVersions.length-1)*plotW);
  const yAt=v=>padT+plotH-((v-minEnd)/range)*plotH;
  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;height:auto;font-family:var(--mono)">`;
  // grid + y labels (finish dates)
  for(let g=0;g<=4;g++){
    const val=minEnd+range*g/4;const y=yAt(val);
    svg+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--border)" stroke-width="1"/>`;
    svg+=`<text x="${padL-6}" y="${y+3}" text-anchor="end" font-size="9" fill="var(--dim)">${fedit(addD(baseStart,Math.round(val)))}</text>`;
  }
  // finish line
  let pts=ends.map((e,i)=>`${xAt(i)},${yAt(e)}`).join(' ');
  svg+=`<polyline points="${pts}" fill="none" stroke="var(--red)" stroke-width="2.5"/>`;
  ends.forEach((e,i)=>{
    svg+=`<circle cx="${xAt(i)}" cy="${yAt(e)}" r="5" fill="var(--red)" stroke="var(--bg)" stroke-width="2"><title>V${i+1} finish: ${fedit(metrics[i].end)}</title></circle>`;
    // x labels
    svg+=`<text x="${xAt(i)}" y="${H-padB+16}" text-anchor="middle" font-size="10" fill="var(--text)">V${i+1}</text>`;
    svg+=`<text x="${xAt(i)}" y="${H-padB+28}" text-anchor="middle" font-size="8" fill="var(--dim)">${metrics[i].count}t · ${metrics[i].progress}%</text>`;
    // value label above point
    svg+=`<text x="${xAt(i)}" y="${yAt(e)-10}" text-anchor="middle" font-size="9" fill="var(--red)">${fedit(metrics[i].end)}</text>`;
  });
  svg+=`<text x="${padL}" y="12" font-size="10" fill="var(--red)">● Project finish date (slip upward = delay)</text>`;
  svg+=`</svg>`;
  host.innerHTML=svg;
}

function renderCmpTransTabs(){
  const host=document.getElementById('cmp-trans-tabs');if(!host)return;
  let h='';
  for(let i=1;i<cmpVersions.length;i++){
    h+=`<button class="cmp-trans-tab ${cmpActiveTrans===i-1?'active':''}" onclick="cmpActiveTrans=${i-1};renderCmpTransTabs();renderCmpChangeList()">V${i} → V${i+1}</button>`;
  }
  // full span
  h+=`<button class="cmp-trans-tab ${cmpActiveTrans===-1?'active':''}" onclick="cmpActiveTrans=-1;renderCmpTransTabs();renderCmpChangeList()">V1 → V${cmpVersions.length} (overall)</button>`;
  host.innerHTML=h;
}
function renderCmpFilterPills(){
  const host=document.getElementById('cmp-filter-pills');if(!host)return;
  host.innerHTML=['all','added','removed','modified'].map(f=>
    `<span class="cmp-fp ${cmpChangeFilter===f?'active':''}" onclick="cmpChangeFilter='${f}';renderCmpFilterPills();renderCmpChangeList()">${f[0].toUpperCase()+f.slice(1)}</span>`).join('');
}
function renderCmpChangeList(){
  const host=document.getElementById('cmp-change-list');if(!host)return;
  let v1,v2;
  if(cmpActiveTrans===-1){v1=cmpVersions[0];v2=cmpVersions[cmpVersions.length-1];}
  else{v1=cmpVersions[cmpActiveTrans];v2=cmpVersions[cmpActiveTrans+1];}
  const d=diffVersions(v1,v2);
  let rows=[];
  if(cmpChangeFilter==='all'||cmpChangeFilter==='added')d.added.forEach(t=>rows.push({type:'add',name:t.name,detail:`new task · ${fedit(t.start)} → ${fedit(t.end)} (${t.duration}d)`,impact:0}));
  if(cmpChangeFilter==='all'||cmpChangeFilter==='removed')d.removed.forEach(t=>rows.push({type:'rem',name:t.name,detail:'task removed',impact:0}));
  if(cmpChangeFilter==='all'||cmpChangeFilter==='modified')d.changed.forEach(c=>rows.push({type:'mod',name:c.name,detail:c.diffs.map(df=>`${df.f}: ${df.from} → ${df.to}`).join(' · '),impact:c.endImpact}));
  if(!rows.length){host.innerHTML='<div style="color:var(--dim);font-size:12px;padding:10px">No changes in this category.</div>';return;}

}

// ════════════════════════════════════════════
// STATUS REPORT (latest planning, as of today)
// ════════════════════════════════════════════
function cmpStatusData(){
  const v=cmpVersions[cmpVersions.length-1];
  const tasks=v.tasks,today=td0();
  const leaves=tasks.filter(t=>!cmpHasKids(tasks,t.id)&&!t.milestone);
  const completed=[],inProgress=[],overdue=[],notStarted=[],upcoming=[];
  leaves.forEach(t=>{
    const prog=t.progress||0;
    if(prog>=100)completed.push(t);
    else if(t.end<today)overdue.push(t);
    else if(prog>0)inProgress.push(t);
    else if(t.start<=today)notStarted.push(t);
    else upcoming.push(t);
  });
  let totalDur=0,doneDur=0,plannedDur=0;
  leaves.forEach(t=>{
    const d=t.duration||1;totalDur+=d;
    doneDur+=d*(Math.min(100,t.progress||0)/100);
    let pp;
    if(today>=t.end)pp=1;else if(today<=t.start)pp=0;else pp=diff(t.start,today)/(diff(t.start,t.end)||1);
    plannedDur+=d*Math.max(0,Math.min(1,pp));
  });
  const actualPct=totalDur?Math.round(doneDur/totalDur*100):0;
  const plannedPct=totalDur?Math.round(plannedDur/totalDur*100):0;
  const spi=plannedPct?+(actualPct/plannedPct).toFixed(2):1;
  // Milestones
  const miles=tasks.filter(t=>t.milestone);
  const milesPassed=miles.filter(m=>m.end<today),milesUpcoming=miles.filter(m=>m.end>=today);
  return{v,tasks,today,leaves,completed,inProgress,overdue,notStarted,upcoming,
    actualPct,plannedPct,spi,miles,milesPassed,milesUpcoming,
    projEnd:tasks.reduce((m,t)=>t.end>m?t.end:m,tasks[0]?.end||today),
    projStart:tasks.reduce((m,t)=>t.start<m?t.start:m,tasks[0]?.start||today)};
}

// Reusable status Gantt SVG (L0 tasks + milestones, progress fills, today line)
function buildStatusGanttSVG(s,widthCss){
  const rows=s.tasks.filter(t=>t.level===0||t.milestone);
  if(!rows.length)return'';
  const ps=s.projStart,pe=s.projEnd,totalD=Math.max(1,diff(ps,pe)+1);
  const W=900,rowH=22,padL=160,padR=20,padT=8,H=padT*2+rows.length*rowH+18;
  const plotW=W-padL-padR;
  const xAt=dstr=>padL+diff(ps,dstr)/totalD*plotW;
  const todayX=xAt(s.today);
  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:${widthCss};max-width:${W}px;height:auto;font-family:Inter,sans-serif">`;
  // month gridlines
  let d=parse(ps);d.setUTCDate(1);
  while(fmt(d)<=pe){const x=xAt(fmt(d));if(x>=padL){svg+=`<line x1="${x}" y1="${padT}" x2="${x}" y2="${H-16}" stroke="var(--border)" stroke-width="1" opacity="0.5"/>`;svg+=`<text x="${x}" y="${H-4}" font-size="8" fill="var(--dim)" text-anchor="middle">${MON[d.getUTCMonth()]}</text>`;}d.setUTCMonth(d.getUTCMonth()+1);}
  // today line
  if(todayX>=padL&&todayX<=W-padR){svg+=`<line x1="${todayX}" y1="${padT}" x2="${todayX}" y2="${H-16}" stroke="var(--green)" stroke-width="2"/><text x="${todayX}" y="${padT+8}" font-size="8" fill="var(--green)" text-anchor="middle">TODAY</text>`;}
  rows.forEach((t,i)=>{
    const y=padT+i*rowH+4;
    svg+=`<text x="6" y="${y+11}" font-size="10" fill="var(--text)" >${t.name.length>26?t.name.slice(0,25)+'…':t.name}</text>`;
    if(t.milestone){
      const mx=xAt(t.start),done=t.end<s.today;
      svg+=`<rect x="${mx-5}" y="${y+3}" width="10" height="10" fill="${done?'var(--green)':'var(--amber)'}" transform="rotate(45 ${mx} ${y+8})"/>`;
    } else {
      const x1=xAt(t.start),x2=xAt(t.end),w=Math.max(3,x2-x1);
      const prog=t.progress||0;
      const overdue=t.end<s.today&&prog<100;
      const barCol=prog>=100?'var(--green)':overdue?'var(--red)':'var(--teal)';
      svg+=`<rect x="${x1}" y="${y+2}" width="${w}" height="13" rx="3" fill="${barCol}" opacity="0.35"/>`;
      svg+=`<rect x="${x1}" y="${y+2}" width="${w*prog/100}" height="13" rx="3" fill="${barCol}"/>`;
      svg+=`<text x="${x2+4}" y="${y+12}" font-size="8" fill="var(--dim)">${prog}%</text>`;
    }
  });
  svg+=`</svg>`;
  return svg;
}

// ── Work-package (L0 ancestor) of a task within a version ──
function cmpWpOf(tasks,id){
  const i=tasks.findIndex(t=>t.id===id);if(i<0)return'(unknown)';
  if(tasks[i].level===0)return tasks[i].name;
  for(let j=i;j>=0;j--){if(tasks[j].level===0)return tasks[j].name;}
  return tasks[i].name;
}
// ── Aggregate change impact per work package (baseline V1 → later V2) ──
function cmpWpImpactData(){
  if(cmpVersions.length<2)return[];
  const v1=cmpVersions[0],v2=cmpVersions[1];
  const d=diffVersions(v1,v2);
  const wp={}; // name → {added,removed,modified,netImpact,changes:[]}
  const ensure=n=>{if(!wp[n])wp[n]={name:n,added:0,removed:0,modified:0,netImpact:0,worstImpact:0,changes:[]};return wp[n];};
  d.added.forEach(t=>{const n=cmpWpOf(v2.tasks,t.id);ensure(n).added++;});
  d.removed.forEach(t=>{const n=cmpWpOf(v1.tasks,t.id);ensure(n).removed++;});
  d.changed.forEach(c=>{const n=cmpWpOf(v2.tasks,c.id);const w=ensure(n);w.modified++;w.netImpact+=c.endImpact||0;if(Math.abs(c.endImpact||0)>Math.abs(w.worstImpact))w.worstImpact=c.endImpact||0;w.changes.push(c);});
  return Object.values(wp).sort((a,b)=>Math.abs(b.netImpact)-Math.abs(a.netImpact)||(b.added+b.removed+b.modified)-(a.added+a.removed+a.modified));
}
function renderCmpWpImpact(){
  const host=document.getElementById('cmp-wp-impact');if(!host)return;
  const data=cmpWpImpactData();
  if(!data.length){host.innerHTML='<div style="color:var(--dim);font-size:12px">No changes to attribute.</div>';return;}
  const maxAbs=Math.max(1,...data.map(w=>Math.abs(w.netImpact)));
  host.innerHTML=data.map(w=>{
    const pct=Math.abs(w.netImpact)/maxAbs*100;
    const col=w.netImpact>0?'var(--red)':w.netImpact<0?'var(--green)':'var(--dim)';
    return `<div style="margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:3px">
        <span style="flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${w.name}">${w.name}</span>
        <span style="font-size:10px;color:var(--dim)">${w.added?`+${w.added} new `:''}${w.removed?`−${w.removed} del `:''}${w.modified?`${w.modified} mod`:''}</span>
        <span style="font-family:var(--mono);font-weight:700;color:${col};min-width:48px;text-align:right">${w.netImpact>0?'+':''}${w.netImpact}d</span>
      </div>
      <div class="stat-bar" style="height:7px"><div style="height:100%;border-radius:4px;width:${pct}%;background:${col}"></div></div>
    </div>`;
  }).join('');
}

function showQuickEdit(e,taskId){
  e.preventDefault();e.stopPropagation();
  const t=GT(taskId);if(!t)return;
  const qe=document.getElementById('qedit');if(!qe)return;
  qe.innerHTML=`
    <div class="qe-title" title="${t.name}">${t.name}</div>
    <div class="qe-row"><label>Progress %</label>
      <input type="range" id="qe-prog" min="0" max="100" value="${t.progress}" style="flex:1;accent-color:var(--teal)" oninput="document.getElementById('qe-pv').textContent=this.value+'%'">
      <span id="qe-pv" style="font-size:11px;font-family:var(--mono);color:var(--teal);min-width:30px">${t.progress}%</span>
    </div>
    <div style="margin-bottom:4px"><label>Comment</label></div>
    <textarea id="qe-cmt">${t.comments||''}</textarea>
    <div class="qe-btns">
      <button class="hbtn" style="font-size:11px" onclick="closeQEdit()">✕</button>
      <button class="hbtn pri" style="font-size:11px;flex:1" onclick="saveQEdit(${taskId})">✓ Save</button>
      <button class="hbtn" style="font-size:11px" onclick="openTaskModal(${taskId});closeQEdit()">⋯ Full Edit</button>
    </div>`;
  // Position near cursor but inside viewport
  const vw=window.innerWidth,vh=window.innerHeight;
  let x=e.clientX+8,y=e.clientY-10;
  if(x+240>vw)x=e.clientX-248;if(y+160>vh)y=vh-170;
  qe.style.left=x+'px';qe.style.top=y+'px';
  qe.classList.add('show');
  // Close on outside click
  setTimeout(()=>document.addEventListener('click',_qeClose,{once:true}),10);
}
function _qeClose(e){if(!document.getElementById('qedit')?.contains(e.target))closeQEdit();}
function closeQEdit(){document.getElementById('qedit')?.classList.remove('show');}
function saveQEdit(taskId){
  const t=GT(taskId);if(!t)return;
  saveUndo();
  t.progress=parseInt(document.getElementById('qe-prog')?.value)||0;
  t.comments=document.getElementById('qe-cmt')?.value||'';
  closeQEdit();recalc();markDirty();render();showToast('✓ Saved');
}

// ═══ UNDO STACK ═══
const undoStack=[];const MAX_UNDO=5;
function saveUndo(){
  undoStack.push({tasks:JSON.stringify(tasks),resources:JSON.stringify(resources)});
  if(undoStack.length>MAX_UNDO)undoStack.shift();
}
function undo(){
  if(!undoStack.length){showToast('↩ Nothing to undo');return;}
  const prev=undoStack.pop();
  tasks=JSON.parse(prev.tasks);
  resources=JSON.parse(prev.resources);
  recalc();markDirty();render();showToast('↩ Undone ('+undoStack.length+' more available)');
}

// ═══ COLUMN RESIZE ═══
let _colDrag=null;
function startColResize(e,colKey){
  e.preventDefault();e.stopPropagation();
  const col=COLS.find(c=>c.k===colKey);if(!col)return;
  _colDrag={col,startX:e.clientX,startW:col.w};
  e.target.classList.add('dragging');
  document.body.style.cursor='col-resize';
}
document.addEventListener('mousemove',e=>{
  if(!_colDrag)return;
  const {col,startX,startW}=_colDrag;
  col.w=Math.max(col.k==='num'?30:50,startW+(e.clientX-startX));
  applyColWidths();
});
document.addEventListener('mouseup',e=>{
  if(!_colDrag)return;
  document.querySelectorAll('.col-rh.dragging').forEach(el=>el.classList.remove('dragging'));
  document.body.style.cursor='';
  _colDrag=null;
});

  const isModal=document.getElementById('overlay')?.classList.contains('show');if(isModal)return;

  if((e.ctrlKey||e.metaKey)&&e.key==='e'){e.preventDefault();exportExcel();}
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();return;}
  if(typing)return;
  if(e.key==='Delete'&&selId)delTask(selId);
  if(e.key==='n'&&!e.ctrlKey){e.preventDefault();openTaskModal(null);}
  if((e.key==='+'||e.key==='=')&&curView==='gantt')zoom(1);

});

    }
    if (event.data && event.data.action === 'saved') {
        const cs = document.getElementById('cloud-sync');
        if (cs) cs.innerHTML = '<span style="color:var(--green)">✓</span> Saved to Cloud';
    }
});

const originalMarkDirty = markDirty;
markDirty = function() {
    originalMarkDirty();
    const proj=document.getElementById('proj-inp')?.value||'project';
    const data={version:6,projectName:proj,exportedAt:new Date().toISOString(),tasks,resources,changeLog,baseline,delayReasons,holidays,meta:{ntid,nrid,DW,collapsed:[...collapsed],projectMode,changeIdSeq,reasonSeq,workMode}};
    window.parent.postMessage({ action: 'save', data: data }, '*');
}

</script>
