<nav class="navbar" *ngIf="auth.isAuthenticated">
  <div class="nav-container">
    <div class="nav-brand" routerLink="/hub">
      <span class="nav-logo-mark">
        <img src="/logo.png" alt="AVL" class="nav-logo-img">
      </span>
      <div class="nav-brand-copy">
        <span class="nav-title">Tools Portal</span>
        <span class="nav-subtitle">Engineering Workspace</span>
      </div>
    </div>

    <div class="nav-links">
      <a routerLink="/hub" routerLinkActive="active" class="nav-link">Workspace</a>
      <a routerLink="/analytics" routerLinkActive="active" class="nav-link">Analytics</a>
      <a *ngIf="auth.isAdmin" routerLink="/admin" routerLinkActive="active" class="nav-link">Admin</a>

      <div class="nav-divider"></div>

      <div class="theme-toggle" title="Toggle dark mode">
        <span class="theme-toggle-label">{{ isDark ? '🌙' : '☀️' }}</span>
        <label class="toggle-switch">
          <input type="checkbox" [checked]="isDark" (change)="toggleTheme()" id="themeToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="nav-divider"></div>

      <div class="profile-menu" *ngIf="auth.currentUser$ | async as user">
        <button
          class="profile-btn"
          (click)="toggleProfileMenu()"
          (blur)="closeProfileMenuDelayed()"
          id="profileMenuBtn"
          title="Account">
          <span class="profile-avatar">{{ getInitials(user.display_name) }}</span>
        </button>

        <div class="profile-dropdown" [class.open]="isProfileOpen">
          <div class="profile-dropdown-header">
            <div class="profile-avatar-lg">{{ getInitials(user.display_name) }}</div>
            <div class="profile-info">
              <span class="profile-name">{{ user.display_name }}</span>
              <span class="profile-email">{{ user.email }}</span>
            </div>
          </div>
          <div class="profile-dropdown-divider"></div>
          <button class="profile-action danger" (click)="logout()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Sign out
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>
