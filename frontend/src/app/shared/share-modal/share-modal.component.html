<div class="modal-backdrop" (click)="onClose()">
  <div class="modal-content glass-card animate-fade-in" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3 style="margin:0;">Share Tool File</h3>
      <button class="btn-close" (click)="onClose()">✕</button>
    </div>
    
    <div class="modal-body">
      <p style="color: var(--avl-text-secondary); font-size: 14px; margin-bottom: 20px;">
        Sharing will create an isolated clone of this file for the recipient. Your original file will not be affected by their changes.
      </p>

      <div *ngIf="errorMsg" class="alert-error">{{ errorMsg }}</div>
      <div *ngIf="successMsg" class="alert-success">{{ successMsg }}</div>

      <div class="form-group">
        <label class="form-label" for="recipientEmail">Recipient Email</label>
        <input 
          type="email" 
          id="recipientEmail" 
          class="form-control" 
          [(ngModel)]="recipientEmail" 
          placeholder="colleague@avl.com">
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn" (click)="onClose()">Cancel</button>
      <button class="btn btn-primary" [disabled]="!recipientEmail || loading" (click)="share()">
        {{ loading ? 'Sharing...' : 'Share Clone' }}
      </button>
    </div>
  </div>
</div>
