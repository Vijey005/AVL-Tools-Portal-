<div class="modal-backdrop" (click)="onClose()">
 <div class="modal-content animate-in" (click)="$event.stopPropagation()">
  <div class="modal-header">
   <h3>Share Tool File</h3>
   <button class="btn-close" (click)="onClose()" title="Close">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
     <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
   </button>
  </div>

  <div class="modal-body">
   <p class="modal-desc">
    Sharing will create an isolated clone of this file for the recipient. Your original file will not be affected by their changes.
   </p>

   <div *ngIf="errorMsg" class="alert-error">{{ errorMsg }}</div>
   <div *ngIf="successMsg" class="alert-success">{{ successMsg }}</div>

   <div class="form-group">
    <label class="form-label" for="targetEmail">Recipient Email</label>
    <input
     type="email"
     id="targetEmail"
     class="form-control"
     [(ngModel)]="targetEmail"
     placeholder="colleague@avl.com">
   </div>
  </div>

  <div class="modal-footer">
   <button class="btn btn-secondary" (click)="onClose()">Cancel</button>
   <button class="btn btn-primary" [disabled]="!targetEmail || loading" (click)="share()">
    {{ loading ? 'Sharing...' : 'Share Clone' }}
   </button>
  </div>
 </div>
</div>
