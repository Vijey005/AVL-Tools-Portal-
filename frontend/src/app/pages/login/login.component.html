<div class="login-wrapper">

  <!-- ========== LEFT — Branded Gradient Panel ========== -->
  <div class="login-left">
    <!-- Decorative overlay shapes for depth -->
    <div class="login-shape login-shape-1"></div>
    <div class="login-shape login-shape-2"></div>
    <div class="login-shape login-shape-3"></div>

    <!-- Logo -->
    <div class="login-brand">
      <span class="login-logo-mark">
        <img src="/logo.png" alt="AVL" class="login-logo-img">
      </span>
    </div>

    <!-- Hero copy -->
    <div class="login-hero">
      <h1>Tools Portal</h1>
      <p>Access your LMM planners, organigrams, and weekly dashboards from one unified workspace.</p>

      <div class="login-badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Secure Login
      </div>
    </div>
  </div>

  <!-- ========== RIGHT — Form Panel ========== -->
  <div class="login-right">
    <div class="login-card glass-panel animate-fade-in">
      <div class="brand">
        <h2>Welcome</h2>
        <p class="subtitle">{{ isLoginMode ? 'Sign in to your workspace' : 'Create your account' }}</p>
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div *ngIf="errorMsg" class="alert-error animate-fade-in">
          {{ errorMsg }}
        </div>

        <div class="form-group" *ngIf="!isLoginMode">
          <label class="form-label" for="displayName">Display Name</label>
          <input
            type="text"
            id="displayName"
            name="displayName"
            class="form-control"
            [(ngModel)]="formData.display_name"
            required
            placeholder="e.g. Jane Doe">
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-control"
            [(ngModel)]="formData.email"
            required
            placeholder="name@avl.com">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-control"
            [(ngModel)]="formData.password"
            required
            placeholder="Enter your password">
        </div>

        <button type="submit" class="btn btn-primary btn-block" [disabled]="!loginForm.form.valid">
          {{ isLoginMode ? 'Sign In' : 'Create Account' }}
        </button>
      </form>

      <div class="toggle-mode">
        <span class="text-muted">
          {{ isLoginMode ? "Don't have an account?" : "Already have an account?" }}
        </span>
        <button class="btn-link" type="button" (click)="toggleMode()">
          {{ isLoginMode ? 'Register here' : 'Sign in here' }}
        </button>
      </div>
    </div>
  </div>

</div>
