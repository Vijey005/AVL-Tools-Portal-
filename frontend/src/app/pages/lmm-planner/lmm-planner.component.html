<div *ngIf="loading" class="lmm-loading">
 <div class="spinner"></div>
 <p>Loading planner...</p>
</div>

<div *ngIf="!loading && loadError" class="lmm-loading">
 <div class="error-state glass-panel">
  <p>{{ loadError }}</p>
  <button class="btn btn-primary" (click)="goBack()">Back to Workspace</button>
 </div>
</div>

<div *ngIf="!loading && !loadError" class="lmm-frame-wrap">
 <iframe #plannerFrame src="/lmm_planner.html" class="lmm-iframe" (load)="onIframeLoad()"></iframe>
</div>
