<app-navbar></app-navbar>
<router-outlet></router-outlet>

<!-- Floating Dev Email Simulator Action Button -->
<div class="dev-mail-trigger" [class.has-unread]="unreadCount > 0" (click)="toggleInbox()" title="Dev Tool: Mock Email Inbox">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
    <polyline points="22,6 12,13 2,6"/>
  </svg>
  <span *ngIf="unreadCount > 0" class="dev-mail-badge">{{ unreadCount }}</span>
</div>

<!-- Slide-out Drawer Panel -->
<div class="dev-mail-drawer" [class.open]="isOpen">
  <div class="dev-mail-header">
    <div class="dev-mail-title">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
      <h3>Simulated Email Inbox (Dev Tool)</h3>
    </div>
    <button class="btn-close-drawer" (click)="toggleInbox()">&times;</button>
  </div>
  
  <div class="dev-mail-body">
    <p class="dev-mail-desc">
      {{ inboxLabel }}
    </p>
    
    <div class="mail-list" *ngIf="emails.length > 0">
      <div class="mail-item" *ngFor="let mail of emails">
        <div class="mail-meta">
          <span class="mail-to"><strong>To:</strong> {{ mail.to_email }}</span>
          <span class="mail-time">{{ mail.created_at | date:'medium':'UTC' }}</span>
        </div>
        <div class="mail-subject"><strong>Subject:</strong> {{ mail.subject }}</div>
        <!-- Render formatted email body containing link -->
        <div class="mail-body" [innerHTML]="formatBody(mail.body)" (click)="isOpen = false"></div>
      </div>
    </div>
    
    <div class="mail-empty" *ngIf="emails.length === 0">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
      <p>No emails simulated yet.</p>
      <span class="text-muted">Request a password reset on the login page to see your approval email here.</span>
    </div>
  </div>
</div>
